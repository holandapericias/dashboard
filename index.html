// ─── API ───
async function F(tb,f,fl){let a=[],o=null;do{const p=new URLSearchParams;if(f)p.set("filterByFormula",f);if(o)p.set("offset",o);(fl||[]).forEach(x=>p.append("fields[]",x));p.set("pageSize","100");const r=await fetch(`https://api.airtable.com/v0/${BS}/${encodeURIComponent(tb)}?${p}`,{headers:{Authorization:`Bearer ${TK}`}});const d=await r.json();if(d.error)throw new Error(d.error.message);if(d.records)a=a.concat(d.records);o=d.offset||null}while(o);return a}

async function patchAT(table,recId,fields){
  const r=await fetch(`https://api.airtable.com/v0/${BS}/${encodeURIComponent(table)}/${recId}`,{
    method:"PATCH",headers:{Authorization:`Bearer ${TK}`,"Content-Type":"application/json"},
    body:JSON.stringify({fields})});
  if(!r.ok)throw new Error("PATCH failed");return r.json();
}
async function postAT(table,fields){
  const r=await fetch(`https://api.airtable.com/v0/${BS}/${encodeURIComponent(table)}`,{
    method:"POST",headers:{Authorization:`Bearer ${TK}`,"Content-Type":"application/json"},
    body:JSON.stringify({records:[{fields}]})});
  if(!r.ok)throw new Error("POST failed");return r.json();
}

    const s=document.getElementById("sel"),n=new Date(),y=n.getFullYear();

    for(let m=1;m<=12;m++){const o=document.createElement("option");o.value=`${y}-${String(m).padStart(2,"0")}`;o.textContent=new Date(y,m-1).toLocaleString(lc(),{month:"long",year:"numeric"});if(m===n.getMonth()+1)o.selected=true;s.appendChild(o)}

// ─── HELPERS ───
function clientName(c){const ids=c.fields.Cliente||[];for(const id of ids){if(CL[id])return CL[id].name}return"—"}
function clientData(c){const ids=c.fields.Cliente||[];for(const id of ids){if(CL[id])return CL[id]}return null}
// KNOWN DEBTOR client record IDs (from spec)
const DEBTOR_CLIENTS=new Set(["recTeLOQoAANlYJiz","rectpEuF1HzHFDVCi"]); // Veneza, Rei do Sushi

function isDebtorClient(c){
  const ids=c.fields.Cliente||[];
  for(const id of ids){
    if(DEBTOR_CLIENTS.has(id))return true;
    const cl=CL[id];
    if(cl){const n=cl.name.toLowerCase();if(n.includes("veneza")||n.includes("rei do sushi"))return true}
  }
  return false;
}
function isDebtor(c){return(c.fields.Fase||"")==="Devedor"||isDebtorClient(c)}

function needsCnf(c){
  // Debtors are NEVER in the "confirm" section — they go to debtors
  if(isDebtor(c))return false;
  const cd=clientData(c);
  if(cd&&cd.cnf)return true;
  const cn=(cd?cd.name:"").toLowerCase();
  if(cn.includes("moura")||cn.includes("doubex")||cn.includes("servis")||cn.includes("servtec")||cn.includes("parangaba"))return true;
  return false;
}
function ec(p){const f=p.fields;const rv=f["Valor Assistente"];if(rv&&rv>0)return{v:rv,c:true};const tp=f["Tipo de Perícia"]||"",l=(f["Local da Perícia"]||"").toLowerCase();if(tp==="Engenharia")return{v:1000,c:false};const iF=l.includes("fortaleza")||l.includes("aldeota")||l.includes("fátima")||l.includes("meireles");return{v:iF?600:1000,c:false}}

// Rescheduling fee: count distinct "Data da Perícia" dates from Prazos linked to case
function rescFee(caso){
  const dates=caso.fields["Data da Perícia (from Prazos)"]||[];
  const extra=Math.max(0,dates.length-1);
  return extra*500;
}
// What remains to bill for a case
function billCalc(caso){
  const f=caso.fields;
  const va=f["Valor Acordado"]||0;
  const fmt=(f["Formato de Pagamento"]||"");
  const is5050=fmt.includes("50/50");
  const cobIds=f["Cobranças"]||[];
  // Find linked cobranças: check BOTH directions (case→cobrança link AND cobrança→case link)
  const linked=CO.filter(c=>{
    if(c.fields.Tipo!=="Entrada")return false;
    if(cobIds.includes(c.id))return true;
    const cr=c.fields["Caso relacionado"]||[];
    return cr.includes(caso.id);
  });
  const rf=rescFee(caso);
  
  if(is5050){
    const has50i=linked.some(c=>(c.fields["Tipo de Pagamento"]||[]).some(t=>t.includes("Iniciais")));
    const has50f=linked.some(c=>(c.fields["Tipo de Pagamento"]||[]).some(t=>t.includes("Finais")));
    if(!has50i&&!has50f){
      return{type:"50i",val:va/2,label:"50% Iniciais",rf:0};
    }
    if(has50i&&!has50f){
      return{type:"50f",val:va/2+rf,label:"50% Finais"+(rf?` + ${t("resc")} R$${rf}`:""),rf};
    }
    return null; // fully billed
  } else {
    // 100% — check if ANY Entrada cobrança with NF already exists
    const hasNF=linked.some(c=>c.fields["Foi emitida NF?"]);
    if(linked.length===0||!hasNF){
      return{type:"100",val:va+rf,label:"100%"+(rf?` + ${t("resc")} R$${rf}`:""),rf};
    }
    return null;
  }
}

function renderTab1(){

    });
    h+=`</div><div class="tt"><span>${t("tot")}</span><span class="r">${$(tAssUnpaid)}</span></div></div></div>`;
  }
  
  // Fixed costs due
  if(cfDue.length){
    h+=`<div style="margin-bottom:16px"><div class="cl" style="margin-bottom:8px">📅 ${t("fxDue")}</div>`;
    h+=`<div class="tb">`;
    cfDue.forEach(r=>{const f=r.fields;
      h+=`<div class="tr" style="grid-template-columns:1fr 80px 80px 80px"><span class="n">${f.Name}</span><span class="d">${t("day")} ${f["Dia Vencimento"]}</span><span><span class="bd bd-w">${f.Categoria||""}</span></span><span class="a r">${$(f["Valor Estimado"])}</span></div>`;
    });
    h+=`</div></div>`;
  }
  if(!assUnpaid.length&&!cfDue.length) h+=`<div class="nv">${t("noData")}</div>`;
  h+=`</div>`;
  
  // ═══ 4.1.B — BILLING TO DO ═══
  // BOTH phases enter billing flow — exclude debtors and fully-billed cases
  const billablePhases=["Encerrado PARA COBRANÇA","Para cobrança pós perícia, falta manifestação"];
  const billAll=CA.filter(r=>billablePhases.includes(r.fields.Fase)&&!isDebtor(r));
  const billAllNeed=billAll.filter(r=>billCalc(r)!==null);
  
  // Split by phase for visual grouping
  const isPostP=r=>r.fields.Fase==="Para cobrança pós perícia, falta manifestação";
  
  // "Encerrado PARA COBRANÇA" cases
  const encDir=billAllNeed.filter(r=>!isPostP(r)&&!needsCnf(r));
  const encCnf=billAllNeed.filter(r=>!isPostP(r)&&needsCnf(r));
  
  // "Pós-Perícia" cases — same split
  const postPDir=billAllNeed.filter(r=>isPostP(r)&&!needsCnf(r));
  const postPCnf=billAllNeed.filter(r=>isPostP(r)&&needsCnf(r));
  
  // Merge for display: direct = encDir + postPDir, confirm = encCnf + postPCnf
  const billDir=[...encDir,...postPDir];
  const billCnf=[...encCnf,...postPCnf];
  
  // PostP informational: only cases in that phase that are ALREADY fully billed (nothing left to bill)
  const postPInfo=CA.filter(r=>isPostP(r)&&!isDebtor(r)&&billCalc(r)===null);
  
  const active5050=CA.filter(r=>{const f=r.fields;
    if(!(f["Formato de Pagamento"]||"").includes("50/50"))return false;
    if(!(f.Fase||"").includes("Ativo"))return false;
    if(isDebtor(r))return false;
    const cobIds=f["Cobranças"]||[];
    const hasEntrada=CO.some(c=>{
      if(c.fields.Tipo!=="Entrada")return false;
      if(cobIds.includes(c.id))return true;
      return(c.fields["Caso relacionado"]||[]).includes(r.id);
    });
    return !hasEntrada;
  });
  
  const totalBillItems=billDir.length+billCnf.length+postPInfo.length+active5050.length;
  
  if(totalBillItems>0){
    h+=`<div class="sec"><div class="st ur">🔥 ${t("billToDo")} <span class="cn">${totalBillItems}</span></div>`;
    
    // Sub-section 1: 50% Iniciais
    if(active5050.length){
      h+=`<div class="abox abox-or"><h3>💰 ${t("bill5050")}</h3><div class="sub">${t("bill5050Sub")}</div>`;
      active5050.forEach((r,i)=>{

        h+=billForm(r.id,"50i",half,i);
        h+=`</div>`;
      });
      h+=`</div>`;
    }
    
    // Sub-section 2: Emitir NF Direto (includes both phases)
    if(billDir.length){
      h+=`<div class="abox abox-go"><h3>✅ ${t("billDirect")}</h3><div class="sub">${t("billDirectSub")}</div>`;
      billDir.forEach((r,i)=>{
        const f=r.fields;const bc=billCalc(r);const va=bc?bc.val:(f["Valor Acordado"]||0);
        const cn=clientName(r);
        const phaseTag=isPostP(r)?` <span class="bd bd-e">${L==="pt"?"PÓS-PERÍCIA":"POST-EXAM"}</span>`:"";
        h+=`<div class="tb" style="margin-bottom:8px"><div class="tr" style="grid-template-columns:1fr 90px 100px 80px"><span class="n">${(f["Palavra Chave"]||"")}${phaseTag}</span><span class="d">${cn}</span><span>${bc?`<span class="bd bd-100">${bc.label}</span>`:""}</span><span class="a o">${$(va)}</span></div>`;
        h+=billForm(r.id,bc?bc.type:"100",va,100+i);
        h+=`</div>`;
      });
      h+=`</div>`;
    }
    
    // Sub-section 3: Confirmar com Cliente (includes both phases)
    if(billCnf.length){
      h+=`<div class="abox abox-warn"><h3>${t("billConfirm")}</h3><div class="sub">${t("billConfirmSub")}</div>`;
      billCnf.forEach((r,i)=>{
        const f=r.fields;const bc=billCalc(r);const va=bc?bc.val:(f["Valor Acordado"]||0);
        const cn=clientName(r);
        const phaseTag=isPostP(r)?` <span class="bd bd-e">${L==="pt"?"PÓS-PERÍCIA":"POST-EXAM"}</span>`:"";
        h+=`<div class="tb" style="margin-bottom:8px"><div class="tr" style="grid-template-columns:1fr 90px 100px 80px"><span class="n">${(f["Palavra Chave"]||"")}${phaseTag}</span><span class="d">${cn}</span><span>${bc?`<span class="bd bd-50">${bc.label}</span>`:""}</span><span class="a o">${$(va)}</span></div>`;
        h+=billForm(r.id,bc?bc.type:"100",va,200+i);
        h+=`</div>`;
      });
      h+=`</div>`;
    }
    
    // Sub-section 4: Pós-Perícia — Informational only (already billed, waiting manifestation)
    if(postPInfo.length){
      h+=`<div class="abox abox-blue"><h3>📋 ${t("billPostP")}</h3><div class="sub">${L==="pt"?"Já cobrados — aguardando manifestação para encerrar":"Already billed — waiting for manifestation to close"}</div><div class="tb">`;

    h+=`</div>`;

  // ═══ 4.1.C — AWAITING PAYMENT ═══

    if(f["NF Retida (devedor)"])return true;
    // Linked to a Debtor case (by fase or by client)
    const cr=f["Caso relacionado"]||[];
    if(cr.some(id=>allDebtorCaseIds.has(id)))return true;
    // >90 days unpaid
    const dc=f["Data da cobrança"]?new Date(f["Data da cobrança"]):null;
    return dc&&dc<h90;
  });
  const tDV=dv.reduce((s,r)=>s+(r.fields["Valor a Receber"]||0),0);
  // Debtor cases that have no cobranças listed (show case-level info)
  const dvCaseIds=new Set();dv.forEach(r=>(r.fields["Caso relacionado"]||[]).forEach(id=>dvCaseIds.add(id)));
  const debtorCasesExtra=allDebtorCases.filter(r=>!dvCaseIds.has(r.id));
  
  if(dv.length||debtorCasesExtra.length){
    h+=`<div class="sec"><div class="st al">🚨 ${t("ovd")} <span class="cn">${dv.length+debtorCasesExtra.length}</span></div>`;
    h+=`<div class="abox abox-rd"><h3>${t("tOut")}: ${$(tDV)}</h3><div class="sub">${dv.length} ${L==="pt"?"cobranças em aberto":"open invoices"}${debtorCasesExtra.length?` · ${debtorCasesExtra.length} ${L==="pt"?"casos sem cobrança":"cases without invoices"}`:""}</div>`;
    h+=`<div class="tb al"><div class="th" style="grid-template-columns:1fr 45px 65px 55px 80px"><span>${t("case_")}</span><span>${t("nf")}</span><span>${t("inv")}</span><span>${t("dys")}</span><span style="text-align:right">${t("amt")}</span></div><div class="sc">`;
    dv.slice(0,30).forEach(r=>{
      const f=r.fields;const dc=f["Data da cobrança"]?new Date(f["Data da cobrança"]):null;const dias=dc?daysBetween(dc,hj):0;
      const nfRetida=f["NF Retida (devedor)"];
      h+=`<div class="tr" style="grid-template-columns:1fr 45px 65px 55px 80px"><span class="n">${(f.Name||"—")}${nfRetida?' <span class="bd bd-r">NF RETIDA</span>':''}</span><span class="d">${f["Número NF"]||"—"}</span><span class="d">${fD(f["Data da cobrança"])}</span><span><span class="bd bd-o">${dias}d</span></span><span class="a r">${$(f["Valor a Receber"])}</span></div>`;
    });
    // Show debtor cases without cobranças
    debtorCasesExtra.forEach(r=>{
      const f=r.fields;const cn=clientName(r);
      h+=`<div class="tr" style="grid-template-columns:1fr 45px 65px 55px 80px"><span class="n">${f["Palavra Chave"]||"—"} <span class="bd bd-r">DEVEDOR</span></span><span class="d">—</span><span class="d">${cn}</span><span>—</span><span class="a r">${$(f["Valor Acordado"])}</span></div>`;
    });
    h+=`</div></div></div></div>`;
  }
  
  h+=`<div class="fo">${t("lUpd")} ${new Date().toLocaleString(lc())} · Holanda Perícias FP&A</div>`;
  document.getElementById("main").innerHTML=h;
}

async function markPaid(recId,btn){
  btn.disabled=true;btn.textContent="...";
  try{
    const today=new Date().toISOString().split("T")[0];
    await patchAT("Cobranças",recId,{"Pago?":true,"Data do Pagamento":today});
    toast(t("saved"));
    setTimeout(reload,1000);
  }catch(e){toast(t("error")+" "+e.message,false);btn.disabled=false;btn.textContent="💰 "+t("markPaid")}
}

async function saveBill(casoId,tipo,idx){
  const nfn=document.getElementById("nfn_"+idx).value;
  const nfv=parseFloat(document.getElementById("nfv_"+idx).value)||0;
  const nfd=document.getElementById("nfd_"+idx).value;
  const btn=document.querySelector(`#bf_${idx} .svbtn`);
  btn.classList.add("saving");btn.textContent="...";
  
  try{
    const caso=CA.find(c=>c.id===casoId);
    if(!caso)throw new Error("Case not found");
    const cobIds=caso.fields["Cobranças"]||[];
    
    // Determine Tipo de Pagamento tag
    let tpPag=[];
    if(tipo==="50i")tpPag=["50% Iniciais"];
    else if(tipo==="50f")tpPag=["50% Finais"];
    else tpPag=["100%"];
    
    // Check if there's an existing linked cobrança to update
    let existingCob=null;
    if(cobIds.length){
      existingCob=CO.find(c=>cobIds.includes(c.id)&&c.fields.Tipo==="Entrada"&&!c.fields["Foi emitida NF?"]&&(c.fields["Tipo de Pagamento"]||[]).some(t=>tpPag.some(tp=>t.includes(tp))));
    }
    
    if(existingCob){
      await patchAT("Cobranças",existingCob.id,{
        "Foi emitida NF?":true,
        "Número NF":nfn,
        "Valor Bruto NF":nfv,
        "Data da cobrança":nfd
      });
    }else{
      await postAT("Cobranças",{
        "Tipo":"Entrada",
        "Caso relacionado":[casoId],
        "Valor a Receber":nfv,
        "Foi emitida NF?":true,
        "Número NF":nfn,
        "Valor Bruto NF":nfv,
        "Data da cobrança":nfd,
        "Tipo de Pagamento":tpPag
      });
    }
    toast(t("saved"));
    setTimeout(reload,1200);
  }catch(e){toast(t("error")+" "+e.message,false);btn.classList.remove("saving");btn.textContent="💾 "+t("saveCob")}
}

// ═══ TAB 2: FINANCIAL ANALYSIS ═══
function renderTab2(){
  const mk=document.getElementById("sel").value,yr=+mk.split("-")[0],mn=+mk.split("-")[1];
  const im=new Date(yr,mn-1,1),fm=new Date(yr,mn,0),hj=new Date(),h90=new Date(hj);h90.setDate(h90.getDate()-90);
  let h="";
  
  // ── Month data ──
  const rM=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Entrada"||!f["Recebido?"])return false;const d=f["Data recebimento"]?new Date(f["Data recebimento"]):null;return d&&d>=im&&d<=fm});
  const tR=rM.reduce((s,r)=>s+(r.fields["Valor Líquido Recebido"]||r.fields["Valor a Receber"]||0),0);
  const gM=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Saída")return false;const d=f["Data do Pagamento"]?new Date(f["Data do Pagamento"]):null;return d&&d>=im&&d<=fm});
  const tG=gM.reduce((s,r)=>s+(r.fields["Valor de Pagamento"]||r.fields["Valor a Receber"]||0),0);
  const arR=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Entrada"||f["Recebido?"])return false;const dc=f["Data da cobrança"]?new Date(f["Data da cobrança"]):null;return dc&&dc>=h90});
  const tAR=arR.reduce((s,r)=>s+(r.fields["Valor a Receber"]||0),0);
  const tFC=CF.reduce((s,r)=>s+(r.fields["Valor Estimado"]||0),0);
  const pc=PZ.filter(r=>(r.fields["Tipo de Prazos"]||"").includes("Perícia")).map(r=>{const e=ec(r);return{v:e.v,c:e.c}});
  const tAE=pc.reduce((s,p)=>s+(p.v||0),0);
  const lu=tR-tG;
  
  // ═══ 4.2.A — CASH FLOW ═══
  const rP=tR+tAR,gP=tG+tFC+tAE,sl=rP-gP;
  
  h+=`<div class="hero ${sl>=0?'ps':'ng'}"><div class="hl">${t("proj")}</div><div class="hv ${sl>=0?'g':'r'}">${$(sl)}</div><div class="hs">${t("pRev")} ${$(rP)} − ${t("pExp")} ${$(gP)}</div></div>`;
  h+=`<div class="cds"><div class="crd"><div class="cl">${t("rMonth")}</div><div class="cv g">${$(tR)}</div><div class="csb">${rM.length} ${t("pRec")}</div></div><div class="crd"><div class="cl">${t("eMonth")}</div><div class="cv r">${$(tG)}</div><div class="csb">${gM.length} ${t("pMade")}</div></div><div class="crd"><div class="cl">${t("sPL")}</div><div class="cv ${lu>=0?'g':'r'}">${$(lu)}</div><div class="csb">${t("rMinE")}</div></div><div class="crd"><div class="cl">${t("acRec")}</div><div class="cv o">${$(tAR)}</div><div class="csb">${arR.length} ${t("pInv")}</div></div></div>`;
  
  // Cash Flow Projection grid
  h+=`<div class="sec"><div class="st">${t("cfP")}</div><div class="fg"><div class="fb"><h3 class="g">▲ ${t("infl")}</h3><div class="fr"><span class="l">${t("aRec")}</span><span class="v g">${$(tR)}</span></div><div class="fr"><span class="l">${t("pI90")}</span><span class="v g">${$(tAR)}</span></div><div class="ft"><span>${t("tPR")}</span><span class="g">${$(rP)}</span></div></div><div class="fb"><h3 class="r">▼ ${t("outfl")}</h3><div class="fr"><span class="l">${t("aSp")}</span><span class="v r">${$(tG)}</span></div><div class="fr"><span class="l">${t("fxC")}</span><span class="v r">${$(tFC)}</span></div><div class="fr"><span class="l">${t("eAss")}</span><span class="v r">${$(tAE)}</span></div><div class="ft"><span>${t("tPE")}</span><span class="r">${$(gP)}</span></div></div></div></div>`;
  
  // ═══ 4.2.B — SMART 30-DAY FORECAST ═══
  const d30=new Date(hj);d30.setDate(d30.getDate()+30);
  
  // Inflows
  // 1. Pending with payment forecast in next 30d
  const pendWithPrev=arR.filter(r=>{const p=r.fields["Previsão de Pagamento"];if(!p)return false;const dp=new Date(p);return dp>=hj&&dp<=d30});
  const vPendPrev=pendWithPrev.reduce((s,r)=>s+(r.fields["Valor a Receber"]||0),0);
  
  // 2. Pending without forecast — use client avg
  const pendNoPrev=arR.filter(r=>{const p=r.fields["Previsão de Pagamento"];if(p)return false;const dc=r.fields["Data da cobrança"]?new Date(r.fields["Data da cobrança"]):null;if(!dc)return false;
    // Estimate using client avg payment days
    const caseIds=r.fields["Caso relacionado"]||[];const caso=CA.find(c=>caseIds.includes(c.id));
    if(!caso)return true; // include anyway
    const cd=clientData(caso);const avg=cd?cd.prazo:45;
    const estDate=new Date(dc);estDate.setDate(estDate.getDate()+avg);
    return estDate>=hj&&estDate<=d30;
  });
  const vPendNoPrev=pendNoPrev.reduce((s,r)=>s+(r.fields["Valor a Receber"]||0),0);
  
  // 3. Cases ready to bill
  const toBill=CA.filter(r=>r.fields.Fase==="Encerrado PARA COBRANÇA");
  const vToBill=toBill.reduce((s,r)=>{const bc=billCalc(r);return s+(bc?bc.val:0)},0);
  
  // 4. New 50/50 without any cobrança
  const new5050=CA.filter(r=>{const f=r.fields;return(f["Formato de Pagamento"]||"").includes("50/50")&&(!f.Cobranças||f.Cobranças.length===0)&&(f.Fase||"").includes("Ativo")});
  const vNew50=new5050.reduce((s,r)=>s+((r.fields["Valor Acordado"]||0)/2),0);
  
  // Probability weighting
  function agingProb(r){
    const dc=r.fields["Data da cobrança"]?new Date(r.fields["Data da cobrança"]):null;
    if(!dc)return 0.7;
    const dias=daysBetween(dc,hj);
    if(dias<30)return 0.9;if(dias<60)return 0.7;if(dias<90)return 0.4;return 0.1;
  }
  const vPendWeighted=pendWithPrev.reduce((s,r)=>s+(r.fields["Valor a Receber"]||0)*agingProb(r),0);
  const vNoPrevW=pendNoPrev.reduce((s,r)=>s+(r.fields["Valor a Receber"]||0)*agingProb(r),0);
  const revProj=vPendWeighted+vNoPrevW+vToBill*0.7+vNew50*0.5;
  
  // Outflows
  const assNext30=PZ.filter(r=>{const dt=r.fields["Data da Perícia"];if(!dt)return false;const d=new Date(dt);return d>=hj&&d<=d30&&(r.fields["Tipo de Prazos"]||"").includes("Perícia")});
  const vAssNext30=assNext30.reduce((s,r)=>s+(ec(r).v||0),0);
  const unpaidOut=CO.filter(r=>r.fields.Tipo==="Saída"&&!r.fields["Pago?"]).reduce((s,r)=>s+(r.fields["Valor de Pagamento"]||r.fields["Valor a Receber"]||0),0);
  const expProj=tFC+vAssNext30+unpaidOut;
  const profitProj=revProj-expProj;
  const safeWithdraw=Math.max(0,profitProj-2*tFC);
  
  h+=`<div class="sec"><div class="st" style="color:var(--gn);border-color:var(--gc)">🔮 ${t("predict")}</div>`;
  h+=`<p style="font-size:12px;color:var(--tl);margin-bottom:16px">${t("predSub")}</p>`;
  
  // Hero forecast
  h+=`<div class="hero ${profitProj>=0?'ps':'ng'}" style="margin-bottom:16px"><div class="hl">${t("predProfit")}</div><div class="hv ${profitProj>=0?'g':'r'}">${$(profitProj)}</div><div class="hs">${t("predRevProj")} ${$(revProj)} − ${t("predExpProj")} ${$(expProj)}</div></div>`;
  
  // Safe withdrawal
  h+=`<div style="background:${safeWithdraw>0?'var(--gb)':'var(--rb)'};border:1px solid ${safeWithdraw>0?'var(--gc)':'var(--rc)'};border-radius:8px;padding:16px;margin-bottom:16px;text-align:center"><div class="cl">${t("predSafe")}</div><div style="font-family:'Barlow Condensed';font-size:32px;font-weight:700;color:${safeWithdraw>0?'var(--gn)':'var(--rd)'}">${$(safeWithdraw)}</div><div style="font-size:11px;color:var(--tl)">${t("predReserve")} (${$(2*tFC)})</div></div>`;
  
  // Breakdown
  h+=`<div class="fg"><div class="fb"><h3 class="g">▲ ${t("predIn")}</h3>`;
  h+=`<div class="fr"><span class="l">${t("predPend")}</span><span class="v g">${$(vPendPrev)}</span></div>`;
  h+=`<div class="fr"><span class="l">${t("predNoPrev")}</span><span class="v g">${$(vPendNoPrev)}</span></div>`;
  h+=`<div class="fr"><span class="l">${t("predToBill")}</span><span class="v g">${$(vToBill)}</span></div>`;
  h+=`<div class="fr"><span class="l">${t("predNew50")}</span><span class="v g">${$(vNew50)}</span></div>`;
  h+=`<div class="ft"><span>${t("predProb")}</span><span class="g">${$(revProj)}</span></div></div>`;
  h+=`<div class="fb"><h3 class="r">▼ ${t("predOut")}</h3>`;
  h+=`<div class="fr"><span class="l">${t("predFx")}</span><span class="v r">${$(tFC)}</span></div>`;
  h+=`<div class="fr"><span class="l">${t("predAss")} (${assNext30.length})</span><span class="v r">${$(vAssNext30)}</span></div>`;
  h+=`<div class="fr"><span class="l">${t("predUnpaidOut")}</span><span class="v r">${$(unpaidOut)}</span></div>`;
  h+=`<div class="ft"><span>${t("predExpProj")}</span><span class="r">${$(expProj)}</span></div></div></div></div>`;
  
  // ═══ 4.2.C — FP&A METRICS ═══
  // Aging
  const allPending=CO.filter(r=>{const f=r.fields;return f.Tipo==="Entrada"&&!f["Recebido?"]&&f["Data da cobrança"]});
  const aging={a:0,b:0,c:0,d:0};
  allPending.forEach(r=>{
    const dc=new Date(r.fields["Data da cobrança"]);const dias=daysBetween(dc,hj);const v=r.fields["Valor a Receber"]||0;
    if(dias<=30)aging.a+=v;else if(dias<=60)aging.b+=v;else if(dias<=90)aging.c+=v;else aging.d+=v;
  });
  const agTot=aging.a+aging.b+aging.c+aging.d||1;
  
  h+=`<div class="sec"><div class="st">📊 ${L==="pt"?"Métricas Analíticas (FP&A)":"Analytical Metrics (FP&A)"}</div>`;
  h+=`<div class="mcard"><h3>${t("agingRec")}</h3>`;
  h+=`<div class="aging-bar"><div class="aging-seg" style="width:${aging.a/agTot*100}%;background:var(--gn)">0-30d</div><div class="aging-seg" style="width:${aging.b/agTot*100}%;background:#FFA000">30-60d</div><div class="aging-seg" style="width:${aging.c/agTot*100}%;background:var(--or)">60-90d</div><div class="aging-seg" style="width:${aging.d/agTot*100}%;background:var(--rd)">90+d</div></div>`;
  h+=`<div style="display:flex;gap:16px;font-size:12px;color:var(--tl);margin-top:8px"><span style="color:var(--gn)">0-30d: ${$(aging.a)}</span><span style="color:#FFA000">30-60d: ${$(aging.b)}</span><span style="color:var(--or)">60-90d: ${$(aging.c)}</span><span style="color:var(--rd)">90+d: ${$(aging.d)}</span></div></div>`;
  
  // Revenue Concentration
  const last12=new Date(hj);last12.setFullYear(last12.getFullYear()-1);
  const recLast12=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Entrada"||!f["Recebido?"])return false;const d=f["Data recebimento"]?new Date(f["Data recebimento"]):null;return d&&d>=last12});
  const clientRevMap={};
  recLast12.forEach(r=>{
    const caseIds=r.fields["Caso relacionado"]||[];const caso=CA.find(c=>caseIds.includes(c.id));
    const cn=caso?clientName(caso):"Outro";
    const v=r.fields["Valor Líquido Recebido"]||r.fields["Valor a Receber"]||0;
    clientRevMap[cn]=(clientRevMap[cn]||0)+v;
  });
  const crEntries=Object.entries(clientRevMap).sort((a,b)=>b[1]-a[1]);
  const crTotal=crEntries.reduce((s,e)=>s+e[1],0)||1;
  
  h+=`<div class="mcard"><h3>${t("concRev")}</h3>`;
  if(crEntries.length){
    crEntries.slice(0,8).forEach(([name,val])=>{
      const pct=(val/crTotal*100).toFixed(1);
      const isRisk=pct>30;
      h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="width:120px;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div><div style="flex:1;height:18px;background:#EDF2F7;border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${isRisk?'var(--rd)':'var(--ac)'};border-radius:3px"></div></div><div style="font-size:12px;font-weight:600;width:50px;text-align:right;color:${isRisk?'var(--rd)':'var(--tx)'}">${pct}%</div></div>`;
    });
    const riskClients=crEntries.filter(([_,v])=>v/crTotal>0.3);
    if(riskClients.length) h+=`<div style="background:var(--rb);border-radius:4px;padding:8px;font-size:11px;color:var(--rd);margin-top:8px">⚠️ ${riskClients.map(c=>c[0]).join(", ")} > 30% ${L==="pt"?"da receita (risco de concentração)":"of revenue (concentration risk)"}</div>`;
  }
  h+=`</div>`;
  
  // DSO
  const paidRecent=CO.filter(r=>{const f=r.fields;return f.Tipo==="Entrada"&&f["Recebido?"]&&f["Data da cobrança"]&&f["Data recebimento"]});
  let dsoSum=0,dsoCnt=0;
  paidRecent.forEach(r=>{
    const dc=new Date(r.fields["Data da cobrança"]);const dr=new Date(r.fields["Data recebimento"]);
    const d=daysBetween(dc,dr);if(d>=0&&d<365){dsoSum+=d;dsoCnt++}
  });
  const dsoReal=dsoCnt?Math.round(dsoSum/dsoCnt):0;
  const clientPrazos=Object.values(CL).map(c=>c.prazo).filter(p=>p>0);
  const dsoExp=clientPrazos.length?Math.round(clientPrazos.reduce((a,b)=>a+b,0)/clientPrazos.length):45;
  
  h+=`<div class="mgrid">`;
  h+=`<div class="mcard"><h3>${t("dso")}</h3><div class="mv ${dsoReal>dsoExp?'r':'g'}">${dsoReal} ${t("dsoDays")}</div><div class="md">${t("dsoReal")}: ${dsoReal}d · ${t("dsoExp")}: ${dsoExp}d</div></div>`;
  
  // Burn Rate & Runway
  const now=new Date();const m3=[],mNames=[];
  for(let i=1;i<=3;i++){const mi=new Date(now.getFullYear(),now.getMonth()-i,1);const mf=new Date(now.getFullYear(),now.getMonth()-i+1,0);
    const gm=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Saída")return false;const d=f["Data do Pagamento"]?new Date(f["Data do Pagamento"]):null;return d&&d>=mi&&d<=mf}).reduce((s,r)=>s+(r.fields["Valor de Pagamento"]||r.fields["Valor a Receber"]||0),0);
    m3.push(gm);
  }
  const burnRate=m3.length?m3.reduce((a,b)=>a+b,0)/m3.length:tFC;
  const allRec=CO.filter(r=>r.fields.Tipo==="Entrada"&&r.fields["Recebido?"]).reduce((s,r)=>s+(r.fields["Valor Líquido Recebido"]||r.fields["Valor a Receber"]||0),0);
  const allGst=CO.filter(r=>r.fields.Tipo==="Saída").reduce((s,r)=>s+(r.fields["Valor de Pagamento"]||r.fields["Valor a Receber"]||0),0);
  const saldo=allRec-allGst;
  const runway=burnRate>0?(saldo/burnRate).toFixed(1):99;
  
  h+=`<div class="mcard"><h3>${t("burnRate")}</h3><div class="mv r">${$(burnRate)}<span style="font-size:14px;color:var(--tl)">/${t("mo")}</span></div><div class="md">${t("runwaySaldo")}: ${$(saldo)} → <strong>${runway} ${t("runwayMo")}</strong></div></div>`;
  h+=`</div>`;
  
  // Working Capital
  const wcFree=saldo;const wcOblig=CO.filter(r=>r.fields.Tipo==="Saída"&&!r.fields["Pago?"]).reduce((s,r)=>s+(r.fields["Valor de Pagamento"]||r.fields["Valor a Receber"]||0),0);
  const wcNet=wcFree-wcOblig;
  h+=`<div class="mcard"><h3>${t("workCap")}</h3><div style="display:flex;gap:20px;align-items:center"><div><div class="cl">${t("wcFree")}</div><div style="font-family:'Barlow Condensed';font-size:22px;font-weight:700;color:var(--gn)">${$(wcFree)}</div></div><div style="font-size:24px;color:var(--tl)">−</div><div><div class="cl">${t("wcOblig")}</div><div style="font-family:'Barlow Condensed';font-size:22px;font-weight:700;color:var(--rd)">${$(wcOblig)}</div></div><div style="font-size:24px;color:var(--tl)">=</div><div><div class="cl">${t("workCap")}</div><div style="font-family:'Barlow Condensed';font-size:22px;font-weight:700;color:${wcNet>=0?'var(--gn)':'var(--rd)'}">${$(wcNet)}</div></div></div></div>`;
  
  // ═══ 4.2.D — ANNUAL SUMMARY ═══
  const ms=[];for(let m=1;m<=12;m++){
    const i2=new Date(yr,m-1,1),f2=new Date(yr,m,0);
    const r2=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Entrada"||!f["Recebido?"])return false;const d=f["Data recebimento"]?new Date(f["Data recebimento"]):null;return d&&d>=i2&&d<=f2}).reduce((s,r)=>s+(r.fields["Valor Líquido Recebido"]||r.fields["Valor a Receber"]||0),0);
    const g2=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Saída")return false;const d=f["Data do Pagamento"]?new Date(f["Data do Pagamento"]):null;return d&&d>=i2&&d<=f2}).reduce((s,r)=>s+(r.fields["Valor de Pagamento"]||r.fields["Valor a Receber"]||0),0);
    ms.push({m:`${yr}-${String(m).padStart(2,"0")}`,l:i2.toLocaleString(lc(),{month:"short"}),r:r2,g:g2,p:r2-g2});
  }
  const mx=Math.max(...ms.map(m=>Math.max(m.r,m.g)),1);
  
  h+=`<div class="sec"><div class="st">${yr} ${t("annOv")}</div><div class="cb"><div class="cg">${ms.map(m=>{const hR=mx?(m.r/mx)*90:0,hG=mx?(m.g/mx)*90:0;const c=m.m===mk;return`<div class="bp"><div class="b" style="height:${Math.max(2,hR)}px;background:${c?'var(--gn)':'#A5D6A7'}"></div><div class="b" style="height:${Math.max(2,hG)}px;background:${c?'var(--rd)':'#EF9A9A'}"></div></div>`}).join("")}</div><div class="ml">${ms.map(m=>`<div class="${m.m===mk?'cu':''}">${m.l}</div>`).join("")}</div><div class="lg"><span><span class="ldd" style="background:var(--gn)"></span>${t("rev")}</span><span><span class="ldd" style="background:var(--rd)"></span>${t("exp")}</span></div>`;
  h+=`<div class="ar ahd"><span>${t("mth")}</span><span style="text-align:right">${t("rev")}</span><span style="text-align:right">${t("exp")}</span><span style="text-align:right">${t("pl")}</span></div>`;
  ms.filter(m=>m.r>0||m.g>0).forEach(m=>{h+=`<div class="ar ${m.m===mk?'acu':''}"><span style="text-transform:capitalize">${m.l}</span><span class="g" style="text-align:right">${$(m.r)}</span><span class="r" style="text-align:right">${$(m.g)}</span><span class="${m.p>=0?'g':'r'}" style="text-align:right;font-weight:600">${$(m.p)}</span></div>`});
  h+=`</div></div>`;
  
  // ═══ 4.2.E — FIXED COSTS ═══
  h+=`<div class="sec"><div class="st">${t("fxCosts")} <span class="cn">${$(tFC)}/${t("mo")}</span></div><div class="tb"><div class="th" style="grid-template-columns:1fr 80px 80px 100px"><span>Name</span><span>${t("dueDay")}</span><span>${t("categ")}</span><span style="text-align:right">${t("val")}</span></div>`;
  CF.forEach(r=>{const f=r.fields;
    h+=`<div class="tr" style="grid-template-columns:1fr 80px 80px 100px"><span class="n">${f.Name}</span><span class="d">${t("day")} ${f["Dia Vencimento"]}</span><span><span class="bd bd-w">${f.Categoria||""}</span></span><span class="a r">${$(f["Valor Estimado"])}</span></div>`;
  });
  h+=`<div class="tt"><span>${t("tot")}</span><span class="r">${$(tFC)}</span></div></div></div>`;
  
  h+=`<div class="fo">${t("lUpd")} ${new Date().toLocaleString(lc())} · Holanda Perícias FP&A</div>`;
  document.getElementById("main").innerHTML=h;
}
</script>

async function _dk(pw){
  var e=new TextEncoder();

  combined.set(ct);combined.set(tag,ct.length);
  var dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv,tagLength:128},key,combined);
