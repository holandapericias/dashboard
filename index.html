<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holanda Perícias — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#F2F8FC;color:#222;min-height:100vh}
header{background:#005F88;color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.1)}
header h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;letter-spacing:.5px}
header .actions{display:flex;gap:10px;align-items:center}
header button{background:#00AEEF;color:#fff;border:0;padding:8px 14px;border-radius:6px;font-family:'Barlow',sans-serif;font-weight:600;cursor:pointer;font-size:14px}
header button:hover{background:#0098d1}
nav{background:#fff;border-bottom:1px solid #d6e4ef;padding:0 28px;display:flex;gap:4px;overflow-x:auto}
nav button{background:none;border:0;padding:14px 18px;font-family:'Barlow',sans-serif;font-weight:600;color:#005F88;cursor:pointer;border-bottom:3px solid transparent;font-size:14px;white-space:nowrap}
nav button.active{border-bottom-color:#00AEEF;color:#003c56}
main{padding:24px 28px;max-width:1400px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:10px;padding:18px;box-shadow:0 2px 6px rgba(0,0,0,.06);cursor:pointer;border-left:5px solid #00AEEF;transition:transform .1s}
.card:hover{transform:translateY(-2px)}
.card.green{border-left-color:#22a06b}
.card.red{border-left-color:#d64545}
.card.orange{border-left-color:#f08c1f}
.card.blue{border-left-color:#00AEEF}
.card .label{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;font-size:13px;color:#6b7c8c;font-weight:600;letter-spacing:.5px}
.card .value{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;color:#003c56;margin-top:6px}
.card .sub{font-size:12px;color:#6b7c8c;margin-top:4px}
.section{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.06);margin-bottom:20px}
.section h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;color:#005F88;margin-bottom:14px;text-transform:uppercase}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:10px 8px;background:#F2F8FC;color:#005F88;font-weight:600;border-bottom:2px solid #d6e4ef;font-size:12px;text-transform:uppercase}
td{padding:10px 8px;border-bottom:1px solid #eef3f7}
tr:hover td{background:#f8fbfd}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.tag.green{background:#dcf2e6;color:#1a7a4f}
.tag.red{background:#fbe1e1;color:#a82929}
.tag.orange{background:#fce7cf;color:#a35a07}
.tag.blue{background:#d9efff;color:#005F88}
.tag.gray{background:#e8edf2;color:#5a6c7d}
.alert{background:#fff7e6;border-left:4px solid #f08c1f;padding:12px 14px;border-radius:6px;margin-bottom:10px;font-size:14px}
.alert.red{background:#fdecec;border-left-color:#d64545}
.case{border:1px solid #e0eaf1;border-radius:8px;margin-bottom:10px;overflow:hidden}
.case-h{padding:12px 14px;background:#f8fbfd;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:14px}
.case-h:hover{background:#eef5fa}
.case-h .name{font-weight:600;color:#003c56}
.case-h .meta{font-size:12px;color:#6b7c8c}
.case-body{display:none;padding:14px;background:#fff;border-top:1px solid #e0eaf1}
.case.open .case-body{display:block}
.timeline{display:flex;flex-direction:column;gap:8px}
.tl-item{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:6px;border-left:4px solid #ccc;background:#f8fbfd}
.tl-item.past{border-left-color:#22a06b;background:#eaf7f0}
.tl-item.current{border-left-color:#00AEEF;background:#e0f2ff}
.tl-item.future{border-left-color:#c8d2dc;background:#f2f5f8;color:#6b7c8c}
.tl-item .date{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;min-width:90px}
.tl-item .type{flex:1;font-size:13px}
.progress{height:8px;background:#e8edf2;border-radius:4px;overflow:hidden;margin:8px 0}
.progress-bar{height:100%;background:#00AEEF;transition:width .3s}
#login{position:fixed;inset:0;background:#005F88;display:flex;align-items:center;justify-content:center;z-index:100}
#login .box{background:#fff;padding:36px;border-radius:12px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3);max-width:340px;width:90%}
#login h2{font-family:'Barlow Condensed',sans-serif;color:#005F88;margin-bottom:18px;font-size:22px}
#login input{width:100%;padding:12px;border:1px solid #cdd9e3;border-radius:6px;font-size:15px;margin-bottom:12px;font-family:'Barlow',sans-serif}
#login button{width:100%;background:#005F88;color:#fff;border:0;padding:12px;border-radius:6px;font-weight:600;cursor:pointer;font-size:15px;font-family:'Barlow',sans-serif}
#login button:hover{background:#003c56}
#login .err{color:#d64545;font-size:13px;margin-top:8px;min-height:18px}
.loader{text-align:center;padding:40px;color:#6b7c8c}
.muted{color:#6b7c8c;font-size:13px}
.right{text-align:right}
.empty{padding:20px;text-align:center;color:#6b7c8c;font-style:italic}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <h2>Holanda Perícias</h2>
    <input id="pw" type="password" placeholder="Senha / Password" autofocus>
    <button id="loginBtn">Entrar / Sign in</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="app" style="display:none">
<header>
  <h1>HOLANDA PERÍCIAS — DASHBOARD</h1>
  <div class="actions">
    <button id="langBtn">EN</button>
    <button id="reloadBtn" title="Reload">↻</button>
  </div>
</header>
<nav>
  <button data-tab="overview" class="active"></button>
  <button data-tab="cobrar"></button>
  <button data-tab="pendentes"></button>
  <button data-tab="devedores"></button>
  <button data-tab="previsao"></button>
  <button data-tab="roadmap"></button>
</nav>
<main id="content"><div class="loader">Carregando...</div></main>
</div>

<script>
const I18N={
  pt:{overview:"Visão Geral",cobrar:"A Cobrar",pendentes:"Pendentes",devedores:"Devedores",previsao:"Previsão 30d",roadmap:"Roadmap",
    entradas:"Entradas",saidas:"Saídas",aberto:"Em Aberto",lucro:"Lucro",alerts:"Alertas",
    case:"Caso",client:"Cliente",value:"Valor",date:"Data",phase:"Fase",type:"Tipo",amount:"Valor",days:"Dias",
    forgot50:"50% iniciais possivelmente esquecidos",paidActivity:"Caso pago com nova atividade",
    noData:"Sem dados",loading:"Carregando dados...",err:"Erro ao carregar"},
  en:{overview:"Overview",cobrar:"To Bill",pendentes:"Pending",devedores:"Overdue",previsao:"Next 30d",roadmap:"Roadmap",
    entradas:"Income",saidas:"Expenses",aberto:"Open",lucro:"Profit",alerts:"Alerts",
    case:"Case",client:"Client",value:"Amount",date:"Date",phase:"Phase",type:"Type",amount:"Amount",days:"Days",
    forgot50:"Possibly forgotten 50% upfront",paidActivity:"Paid case with new activity",
    noData:"No data",loading:"Loading...",err:"Load error"}
};
let LANG='pt';
const t=k=>I18N[LANG][k]||k;

const F={
  caso:{nome:'fldj5FBvJfRd0BC22',fase:'fld86RIjqxRbIyK2H',valor:'fldxj1JNDROjFVS0I',formato:'fldorcMm83hAOgwmp',cliente:'fld7ddtpPu5BrgIoL',processo:'fldzUYMqa3SNmcaiy',dataPericia:'fld1SIT1qCgOrzvwE'},
  cob:{nome:'fldmEqze0enDJ9NgS',tipo:'flduuDN0KZkIxDa5E',recebido:'fldJF2iTO9MuOrvPu',valorReceber:'fldctzCHWdI5Ywslb',dataCobranca:'fld017hwmpf88pMf4',nfEmitida:'fldwiByBRFrrfqXi0',pago:'fldseQscWInxIjkWT',tipoPag:'fldoz03J5oMdtYtvy',caso:'fldxNcSHI6NwRA1Ec',dataReceb:'flddyKZoD9Kg1i49b',nfRetida:'fldPNYtiEom533bLg',valorPag:'fldNRRnaAxXSwcyZ0',dataPag:'fldMqz2o0dokkPDKI'},
  cli:{nome:'fldPlIIeCVL1PjHuP',confirmar:'fldRJLmUby1ZcqPoC'},
  prazo:{data:'fldYl3z2vJDBxc7ql',caso:'fldJ5zNofON8zZHQO',tipo:'fldwFdFcb76bkbjD4',finalizado:'fldrhICAJtN3gqXkR',valorAss:'fldp3Y2x1I5EZHzyE'}
};
const BASE='appTEAYT5TYhnQwTn';
const TBL={casos:'Casos',cob:'Cobranças',cli:'Clientes',prazo:'Prazos'};

const ENC_TOKEN='U2FsdGVkX194UJtfpYg8cvCjBafdRCJf+su7nO9ExDKeqIXt/lKaoQI7C5kekd6UwjyXN1YGhS+H4adcmq3lJAWhcC87lYckPgJPOdrMjJzukyH3U463Oio5GPJQpmzrljMBrJcs+TrT42ix9Ji8WQ==';
let TOKEN=null;

async function decryptToken(pw){
  const raw=Uint8Array.from(atob(ENC_TOKEN),c=>c.charCodeAt(0));
  if(String.fromCharCode.apply(null,raw.slice(0,8))!=='Salted__')throw new Error('bad');
  const salt=raw.slice(8,16),ct=raw.slice(16);
  const pwKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},pwKey,384);
  const key=await crypto.subtle.importKey('raw',bits.slice(0,32),{name:'AES-CBC'},false,['decrypt']);
  const iv=bits.slice(32,48);
  const pt=await crypto.subtle.decrypt({name:'AES-CBC',iv},key,ct);
  return new TextDecoder().decode(pt);
}

document.getElementById('loginBtn').onclick=async()=>{
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('loginErr');
  err.textContent='';
  try{
    TOKEN=await decryptToken(pw);
    if(!TOKEN.startsWith('pat'))throw new Error('bad');
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    loadData();
  }catch(e){err.textContent='Senha incorreta / Wrong password';}
};
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginBtn').click();});

const DATA={casos:[],cob:[],cli:[],prazo:[]};

async function fetchAll(table){
  const recs=[];let offset='';
  do{
    const url='https://api.airtable.com/v0/'+BASE+'/'+encodeURIComponent(table)+'?returnFieldsByFieldId=true&pageSize=100'+(offset?'&offset='+offset:'');
    const r=await fetch(url,{headers:{Authorization:'Bearer '+TOKEN}});
    if(!r.ok)throw new Error('HTTP '+r.status+' '+table);
    const j=await r.json();
    recs.push.apply(recs,j.records);
    offset=j.offset||'';
  }while(offset);
  return recs;
}

async function loadData(){
  document.getElementById('content').innerHTML='<div class="loader">'+t('loading')+'</div>';
  try{
    const r=await Promise.all([fetchAll(TBL.casos),fetchAll(TBL.cob),fetchAll(TBL.cli),fetchAll(TBL.prazo)]);
    DATA.casos=r[0];DATA.cob=r[1];DATA.cli=r[2];DATA.prazo=r[3];
    render();
  }catch(e){document.getElementById('content').innerHTML='<div class="loader" style="color:#d64545">'+t('err')+': '+e.message+'</div>';}
}

const fv=(rec,fid)=>rec.fields[fid];
const num=v=>typeof v==='number'?v:0;
const fmtBRL=v=>'R$ '+(num(v)).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate=d=>{if(!d)return '—';const dt=new Date(d);return dt.toLocaleDateString(LANG==='pt'?'pt-BR':'en-US');};
const today=()=>{const d=new Date();d.setHours(0,0,0,0);return d;};
const parseDate=s=>s?new Date(s):null;
const daysBetween=(a,b)=>Math.floor((b-a)/86400000);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const casoById=id=>DATA.casos.find(c=>c.id===id);
const cliById=id=>DATA.cli.find(c=>c.id===id);
const casoNome=rec=>fv(rec,F.caso.nome)||'(sem nome)';
const cliNomeOfCaso=caso=>{const cid=fv(caso,F.caso.cliente);if(!cid||!cid[0])return '—';const c=cliById(cid[0]);return c?(fv(c,F.cli.nome)||'—'):'—';};

// BUG FIX 1+2: Saída uses DataPagamento + ValorPagamento
const isSaida=cob=>{
  const dp=fv(cob,F.cob.dataPag),vp=fv(cob,F.cob.valorPag);
  return !!(dp||(typeof vp==='number'&&vp>0));
};
const isEntrada=cob=>{
  if(isSaida(cob))return false;
  return fv(cob,F.cob.pago)===true||fv(cob,F.cob.recebido)===true||!!fv(cob,F.cob.dataReceb);
};

function computeOverview(){
  let entradas=0,saidas=0,aberto=0;
  const lEnt=[],lSai=[],lAb=[];
  for(const cob of DATA.cob){
    if(isSaida(cob)){
      const v=num(fv(cob,F.cob.valorPag));
      saidas+=v;
      lSai.push({nome:fv(cob,F.cob.nome)||'—',valor:v,data:fv(cob,F.cob.dataPag)});
    }else if(isEntrada(cob)){
      const v=num(fv(cob,F.cob.valorReceber));
      entradas+=v;
      lEnt.push({nome:fv(cob,F.cob.nome)||'—',valor:v,data:fv(cob,F.cob.dataReceb)||fv(cob,F.cob.dataCobranca)});
    }else{
      const v=num(fv(cob,F.cob.valorReceber));
      if(v>0){
        aberto+=v;
        lAb.push({nome:fv(cob,F.cob.nome)||'—',valor:v,data:fv(cob,F.cob.dataCobranca)});
      }
    }
  }
  return {entradas:entradas,saidas:saidas,aberto:aberto,lucro:entradas-saidas,lEnt:lEnt,lSai:lSai,lAb:lAb};
}

function computeCobrar(){
  const fasesEnc=['Encerrado PARA COBRANÇA','Encerrado - Falta Pagamento'];
  const out=[];
  for(const c of DATA.casos){
    const fase=fv(c,F.caso.fase);
    if(fasesEnc.indexOf(fase)>=0){
      out.push({caso:c,reason:'Encerrado',valor:num(fv(c,F.caso.valor))});
    }
  }
  for(const c of DATA.casos){
    const fmt=fv(c,F.caso.formato);
    if(fmt&&String(fmt).indexOf('50/50')>=0){
      const cobs=DATA.cob.filter(co=>{const r=fv(co,F.cob.caso);return r&&r.indexOf(c.id)>=0&&!isSaida(co);});
      const hasInicial=cobs.some(co=>{const tp=fv(co,F.cob.tipo);return tp&&String(tp).toLowerCase().indexOf('inicial')>=0&&isEntrada(co);});
      if(!hasInicial)out.push({caso:c,reason:'50% inicial pendente',valor:num(fv(c,F.caso.valor))/2});
    }
  }
  return out;
}

function computePendentes(){
  return DATA.cob.filter(c=>fv(c,F.cob.nfEmitida)===true&&fv(c,F.cob.pago)!==true&&!isSaida(c));
}

function computeDevedores(){
  const t0=today();
  return DATA.cob.filter(c=>{
    if(isSaida(c)||fv(c,F.cob.pago)===true)return false;
    const d=parseDate(fv(c,F.cob.dataCobranca));
    if(!d)return false;
    return daysBetween(d,t0)>90&&num(fv(c,F.cob.valorReceber))>0;
  });
}

function computePrevisao(){
  const t0=today();const t30=new Date(t0);t30.setDate(t30.getDate()+30);
  return DATA.cob.filter(c=>{
    if(isSaida(c)||fv(c,F.cob.pago)===true)return false;
    const d=parseDate(fv(c,F.cob.dataCobranca));
    return d&&d>=t0&&d<=t30;
  });
}

// BUG FIX 3: Use date comparison since "Finalizado?" is empty
function computeRoadmap(){
  const byC={};
  for(const p of DATA.prazo){
    const cid=fv(p,F.prazo.caso);if(!cid||!cid[0])continue;
    (byC[cid[0]]=byC[cid[0]]||[]).push(p);
  }
  const t0=today();
  const out=[];
  for(const cid in byC){
    const c=casoById(cid);if(!c)continue;
    const prazos=byC[cid].map(p=>{
      const d=parseDate(fv(p,F.prazo.data));
      return {data:d,tipo:fv(p,F.prazo.tipo)||'—',concluido:!!(d&&d<t0)};
    }).sort((a,b)=>(a.data?a.data.getTime():0)-(b.data?b.data.getTime():0));
    const total=prazos.length;const done=prazos.filter(p=>p.concluido).length;
    // Mark current = first non-concluido
    let markedCurrent=false;
    for(const p of prazos){if(!p.concluido&&!markedCurrent){p.current=true;markedCurrent=true;}}
    out.push({caso:c,prazos:prazos,total:total,done:done,progress:total?done/total*100:0});
  }
  return out.sort((a,b)=>{
    if(a.progress===100&&b.progress!==100)return 1;
    if(b.progress===100&&a.progress!==100)return -1;
    return b.progress-a.progress;
  });
}

function computeAlerts(){
  const a=[];
  for(const c of DATA.casos){
    const fmt=fv(c,F.caso.formato);const fase=fv(c,F.caso.fase);
    if(fmt&&String(fmt).indexOf('50/50')>=0&&fase&&(String(fase).indexOf('Pós')>=0||String(fase).indexOf('Aguardando Laudo')>=0)){
      const cobs=DATA.cob.filter(co=>{const r=fv(co,F.cob.caso);return r&&r.indexOf(c.id)>=0;});
      const hasInicial=cobs.some(co=>{const tp=fv(co,F.cob.tipo);return tp&&String(tp).toLowerCase().indexOf('inicial')>=0&&isEntrada(co);});
      if(!hasInicial)a.push({type:'forgot50',caso:c});
    }
  }
  const t0=today();
  for(const c of DATA.casos){
    if(fv(c,F.caso.fase)==='Encerrado - Pago'){
      const hasFuture=DATA.prazo.some(p=>{
        const cid=fv(p,F.prazo.caso);if(!cid||cid.indexOf(c.id)<0)return false;
        const d=parseDate(fv(p,F.prazo.data));return d&&d>=t0;
      });
      if(hasFuture)a.push({type:'paidActivity',caso:c});
    }
  }
  return a;
}

let TAB='overview';
let OVERVIEW_CACHE=null;

function render(){
  document.querySelectorAll('nav button').forEach(b=>{
    b.textContent=t(b.dataset.tab);
    b.classList.toggle('active',b.dataset.tab===TAB);
  });
  document.getElementById('langBtn').textContent=LANG==='pt'?'EN':'PT';
  const c=document.getElementById('content');
  if(TAB==='overview')c.innerHTML=renderOverview();
  else if(TAB==='cobrar')c.innerHTML=renderCobrar();
  else if(TAB==='pendentes')c.innerHTML=renderPendentes();
  else if(TAB==='devedores')c.innerHTML=renderDevedores();
  else if(TAB==='previsao')c.innerHTML=renderPrevisao();
  else if(TAB==='roadmap')c.innerHTML=renderRoadmap();
  attachHandlers();
}

function renderOverview(){
  const o=computeOverview();
  OVERVIEW_CACHE=o;
  const a=computeAlerts();
  return ''+
    '<div class="cards">'+
      '<div class="card green" data-card="ent"><div class="label">'+t('entradas')+'</div><div class="value">'+fmtBRL(o.entradas)+'</div><div class="sub">'+o.lEnt.length+' itens</div></div>'+
      '<div class="card red" data-card="sai"><div class="label">'+t('saidas')+'</div><div class="value">'+fmtBRL(o.saidas)+'</div><div class="sub">'+o.lSai.length+' itens</div></div>'+
      '<div class="card orange" data-card="ab"><div class="label">'+t('aberto')+'</div><div class="value">'+fmtBRL(o.aberto)+'</div><div class="sub">'+o.lAb.length+' itens</div></div>'+
      '<div class="card blue" data-card="lu"><div class="label">'+t('lucro')+'</div><div class="value">'+fmtBRL(o.lucro)+'</div><div class="sub">'+t('entradas')+' − '+t('saidas')+'</div></div>'+
    '</div>'+
    '<div class="section" id="cardListSec" style="display:none"><h2 id="cardListTitle"></h2><div id="cardList"></div></div>'+
    '<div class="section"><h2>'+t('alerts')+'</h2>'+
    (a.length===0?'<div class="empty">'+t('noData')+'</div>':a.map(x=>'<div class="alert '+(x.type==='forgot50'?'red':'')+'"><strong>'+(x.type==='forgot50'?t('forgot50'):t('paidActivity'))+':</strong> '+esc(casoNome(x.caso))+' — '+esc(cliNomeOfCaso(x.caso))+'</div>').join(''))+
    '</div>';
}

function renderCobrar(){
  const list=computeCobrar();
  const total=list.reduce((s,x)=>s+x.valor,0);
  return '<div class="section"><h2>'+t('cobrar')+' — '+fmtBRL(total)+' ('+list.length+')</h2>'+
    (list.length===0?'<div class="empty">'+t('noData')+'</div>':
    '<table><thead><tr><th>'+t('case')+'</th><th>'+t('client')+'</th><th>'+t('phase')+'</th><th>'+t('type')+'</th><th class="right">'+t('value')+'</th></tr></thead><tbody>'+
    list.map(x=>'<tr><td>'+esc(casoNome(x.caso))+'</td><td>'+esc(cliNomeOfCaso(x.caso))+'</td><td>'+esc(fv(x.caso,F.caso.fase)||'—')+'</td><td><span class="tag '+(x.reason==='Encerrado'?'green':'orange')+'">'+esc(x.reason)+'</span></td><td class="right">'+fmtBRL(x.valor)+'</td></tr>').join('')+
    '</tbody></table>')+'</div>';
}

function renderPendentes(){
  const list=computePendentes();
  const total=list.reduce((s,c)=>s+num(fv(c,F.cob.valorReceber)),0);
  return '<div class="section"><h2>'+t('pendentes')+' — '+fmtBRL(total)+' ('+list.length+')</h2>'+
    (list.length===0?'<div class="empty">'+t('noData')+'</div>':
    '<table><thead><tr><th>'+t('case')+'</th><th>'+t('date')+'</th><th class="right">'+t('value')+'</th></tr></thead><tbody>'+
    list.map(r=>'<tr><td>'+esc(fv(r,F.cob.nome)||'—')+'</td><td>'+fmtDate(fv(r,F.cob.dataCobranca))+'</td><td class="right">'+fmtBRL(num(fv(r,F.cob.valorReceber)))+'</td></tr>').join('')+
    '</tbody></table>')+'</div>';
}

function renderDevedores(){
  const list=computeDevedores();
  const total=list.reduce((s,c)=>s+num(fv(c,F.cob.valorReceber)),0);
  const t0=today();
  list.sort((a,b)=>(parseDate(fv(a,F.cob.dataCobranca))||0)-(parseDate(fv(b,F.cob.dataCobranca))||0));
  return '<div class="section"><h2>'+t('devedores')+' — '+fmtBRL(total)+' ('+list.length+')</h2>'+
    (list.length===0?'<div class="empty">'+t('noData')+'</div>':
    '<table><thead><tr><th>'+t('case')+'</th><th>'+t('date')+'</th><th class="right">'+t('days')+'</th><th class="right">'+t('value')+'</th></tr></thead><tbody>'+
    list.map(r=>'<tr><td>'+esc(fv(r,F.cob.nome)||'—')+'</td><td>'+fmtDate(fv(r,F.cob.dataCobranca))+'</td><td class="right">'+daysBetween(parseDate(fv(r,F.cob.dataCobranca)),t0)+'</td><td class="right">'+fmtBRL(num(fv(r,F.cob.valorReceber)))+'</td></tr>').join('')+
    '</tbody></table>')+'</div>';
}

function renderPrevisao(){
  const list=computePrevisao();
  list.sort((a,b)=>(parseDate(fv(a,F.cob.dataCobranca))||0)-(parseDate(fv(b,F.cob.dataCobranca))||0));
  const total=list.reduce((s,c)=>s+num(fv(c,F.cob.valorReceber)),0);
  return '<div class="section"><h2>'+t('previsao')+' — '+fmtBRL(total)+' ('+list.length+')</h2>'+
    (list.length===0?'<div class="empty">'+t('noData')+'</div>':
    '<table><thead><tr><th>'+t('case')+'</th><th>'+t('date')+'</th><th class="right">'+t('value')+'</th></tr></thead><tbody>'+
    list.map(r=>'<tr><td>'+esc(fv(r,F.cob.nome)||'—')+'</td><td>'+fmtDate(fv(r,F.cob.dataCobranca))+'</td><td class="right">'+fmtBRL(num(fv(r,F.cob.valorReceber)))+'</td></tr>').join('')+
    '</tbody></table>')+'</div>';
}

function renderRoadmap(){
  const list=computeRoadmap();
  return '<div class="section"><h2>'+t('roadmap')+' ('+list.length+')</h2>'+
    (list.length===0?'<div class="empty">'+t('noData')+'</div>':
    list.map(x=>{
      const items=x.prazos.map(p=>{
        const cls=p.concluido?'past':(p.current?'current':'future');
        return '<div class="tl-item '+cls+'"><div class="date">'+fmtDate(p.data)+'</div><div class="type">'+esc(p.tipo)+'</div></div>';
      }).join('');
      return '<div class="case"><div class="case-h"><div style="flex:1"><div class="name">'+esc(casoNome(x.caso))+'</div><div class="meta">'+esc(cliNomeOfCaso(x.caso))+' • '+esc(fv(x.caso,F.caso.fase)||'—')+'</div></div><div style="min-width:180px"><div class="progress"><div class="progress-bar" style="width:'+x.progress+'%"></div></div><div class="meta right">'+x.done+'/'+x.total+'</div></div></div><div class="case-body"><div class="timeline">'+items+'</div></div></div>';
    }).join(''))+'</div>';
}

function attachHandlers(){
  document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{TAB=b.dataset.tab;render();});
  document.querySelectorAll('.case-h').forEach(h=>h.onclick=()=>h.parentElement.classList.toggle('open'));
  document.querySelectorAll('.card[data-card]').forEach(card=>{
    card.onclick=()=>{
      if(!OVERVIEW_CACHE)return;
      const k=card.dataset.card;
      const sec=document.getElementById('cardListSec');
      if(k==='lu'){sec.style.display='none';return;}
      const arr={ent:OVERVIEW_CACHE.lEnt,sai:OVERVIEW_CACHE.lSai,ab:OVERVIEW_CACHE.lAb}[k];
      const titles={ent:t('entradas'),sai:t('saidas'),ab:t('aberto')};
      document.getElementById('cardListTitle').textContent=titles[k];
      const sorted=arr.slice().sort((x,y)=>(new Date(y.data||0))-(new Date(x.data||0)));
      const html=sorted.length?'<table><thead><tr><th>'+t('case')+'</th><th>'+t('date')+'</th><th class="right">'+t('amount')+'</th></tr></thead><tbody>'+
        sorted.map(x=>'<tr><td>'+esc(x.nome)+'</td><td>'+fmtDate(x.data)+'</td><td class="right">'+fmtBRL(x.valor)+'</td></tr>').join('')+'</tbody></table>':'<div class="empty">'+t('noData')+'</div>';
      document.getElementById('cardList').innerHTML=html;
      sec.style.display='block';
      sec.scrollIntoView({behavior:'smooth',block:'nearest'});
    };
  });
}

document.getElementById('langBtn').onclick=()=>{LANG=LANG==='pt'?'en':'pt';render();};
document.getElementById('reloadBtn').onclick=loadData;
</script>
</body>
