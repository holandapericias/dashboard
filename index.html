<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holanda Perícias — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#F2F8FC;color:#222;min-height:100vh}
header{background:#005F88;color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.1);flex-wrap:wrap;gap:12px}
header h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;letter-spacing:.5px}
header .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
header select,header button{background:#00AEEF;color:#fff;border:0;padding:8px 14px;border-radius:6px;font-family:'Barlow',sans-serif;font-weight:600;cursor:pointer;font-size:14px}
header select{background:#fff;color:#003c56}
header button:hover{background:#0098d1}
nav{background:#fff;border-bottom:1px solid #d6e4ef;padding:0 28px;display:flex;gap:4px;overflow-x:auto}
nav button{background:none;border:0;padding:14px 18px;font-family:'Barlow',sans-serif;font-weight:600;color:#005F88;cursor:pointer;border-bottom:3px solid transparent;font-size:14px;white-space:nowrap}
nav button.active{border-bottom-color:#00AEEF;color:#003c56}
main{padding:24px 28px;max-width:1400px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:20px}
.card{background:#fff;border-radius:10px;padding:18px;box-shadow:0 2px 6px rgba(0,0,0,.06);cursor:pointer;border-left:5px solid #00AEEF;transition:all .15s;position:relative}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card.active{box-shadow:0 0 0 3px #00AEEF,0 4px 12px rgba(0,174,239,.3)}
.card.green{border-left-color:#22a06b}.card.red{border-left-color:#d64545}.card.orange{border-left-color:#f08c1f}.card.blue{border-left-color:#00AEEF}
.card .label{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;font-size:13px;color:#6b7c8c;font-weight:600;letter-spacing:.5px}
.card .value{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:#003c56;margin-top:6px}
.card .sub{font-size:12px;color:#6b7c8c;margin-top:4px}
.card .chev{position:absolute;right:14px;top:18px;color:#00AEEF;font-size:16px}
.section{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.06);margin-bottom:20px}
.section h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;color:#005F88;margin-bottom:14px;text-transform:uppercase}
.section h3{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:#005F88;margin:16px 0 8px;text-transform:uppercase}
.section.warn{background:#fffbec;border:1px solid #f3d98a}
.section.warn h2{color:#a35a07}
.section .note{font-size:12px;color:#6b7c8c;margin-top:8px;font-style:italic}
.section .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;font-size:13px;color:#6b7c8c}
.section .toolbar select{padding:6px 10px;border:1px solid #cdd9e3;border-radius:5px;font-family:inherit;font-size:13px;background:#fff}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:10px 8px;background:#F2F8FC;color:#005F88;font-weight:600;border-bottom:2px solid #d6e4ef;font-size:12px;text-transform:uppercase}
td{padding:10px 8px;border-bottom:1px solid #eef3f7;vertical-align:top}
tr.group-head td{background:#eef5fa;font-weight:700;color:#005F88;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;font-size:12px;padding:6px 8px}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:#eef5fa}
tr.expanded td{background:#f0f7fc}
.proc{font-size:11px;color:#6b7c8c;font-family:'Barlow Condensed',sans-serif;margin-top:2px;letter-spacing:.3px}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.tag.green{background:#dcf2e6;color:#1a7a4f}
.tag.red{background:#fbe1e1;color:#a82929}
.tag.orange{background:#fce7cf;color:#a35a07}
.tag.blue{background:#d9efff;color:#005F88}
.tag.yellow{background:#fff5d1;color:#8a6a00}
.tag.gray{background:#e8edf2;color:#5a6c7d}
.tag.purple{background:#eee2f7;color:#5a2b87}
.alert{background:#fff7e6;border-left:4px solid #f08c1f;padding:12px 14px;border-radius:6px;margin-bottom:10px;font-size:14px}
.alert.red{background:#fdecec;border-left-color:#d64545}
.toast{position:fixed;top:16px;right:16px;background:#005F88;color:#fff;padding:14px 18px;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:200;max-width:360px;font-size:13px}
.toast.warn{background:#a35a07}
.right{text-align:right}
.empty{padding:20px;text-align:center;color:#6b7c8c;font-style:italic}
.loader{text-align:center;padding:40px;color:#6b7c8c}
.loader .sp{display:inline-block;width:36px;height:36px;border:4px solid #e0eaf1;border-top-color:#00AEEF;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader .step{font-size:13px;color:#6b7c8c;margin-top:4px}
.loader .step.done{color:#22a06b}
.detail{padding:18px 22px;background:#f8fbfd;border-top:1px solid #e0eaf1;border-bottom:1px solid #e0eaf1}
.detail h4{font-family:'Barlow Condensed',sans-serif;color:#005F88;font-size:14px;text-transform:uppercase;margin:14px 0 10px}
.detail h4:first-child{margin-top:0}
.roadmap{position:relative;padding:20px 0 14px;margin:8px 0}
.roadmap .track{position:absolute;left:8%;right:8%;top:32px;height:4px;background:#e0eaf1;border-radius:2px}
.roadmap .fill{position:absolute;left:8%;top:32px;height:4px;background:linear-gradient(90deg,#22a06b,#00AEEF);border-radius:2px;transition:width .5s}
.roadmap .stages{position:relative;display:flex;justify-content:space-between;padding:0 6%}
.stage{text-align:center;flex:1;position:relative;z-index:2}
.stage .dot{width:26px;height:26px;border-radius:50%;background:#c8d2dc;margin:0 auto;border:3px solid #fff;box-shadow:0 0 0 2px #c8d2dc;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.stage.done .dot{background:#22a06b;box-shadow:0 0 0 2px #22a06b}
.stage.current .dot{background:#00AEEF;box-shadow:0 0 0 2px #00AEEF;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px #00AEEF,0 0 0 4px rgba(0,174,239,.3)}50%{box-shadow:0 0 0 2px #00AEEF,0 0 0 12px rgba(0,174,239,0)}}
.stage .name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;color:#003c56;margin-top:8px;line-height:1.2}
.stage.future .name{color:#8a96a3}
.stage .date{font-size:11px;color:#6b7c8c;margin-top:2px}
.stage .extras{font-size:10px;color:#a35a07;margin-top:3px;font-weight:600}
.pbar{height:10px;background:#e8edf2;border-radius:5px;overflow:hidden;margin:10px 0 6px}
.pbar>div{height:100%;background:linear-gradient(90deg,#22a06b,#00AEEF);transition:width .5s}
.progress-lbl{text-align:center;font-size:13px;color:#005F88;font-weight:600}
.form{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin:6px 0 4px;background:#fff;padding:12px;border-radius:8px;border:1px solid #e0eaf1}
.form label{font-size:11px;color:#005F88;font-weight:600;text-transform:uppercase;display:block;margin-bottom:4px}
.form input,.form textarea{width:100%;padding:8px;border:1px solid #cdd9e3;border-radius:5px;font-family:'Barlow',sans-serif;font-size:13px}
.form textarea{grid-column:1/-1;min-height:60px;resize:vertical}
.form .actions{grid-column:1/-1;display:flex;gap:8px;align-items:center}
.btn{background:#00AEEF;color:#fff;border:0;padding:8px 14px;border-radius:5px;font-family:'Barlow',sans-serif;font-weight:600;cursor:pointer;font-size:13px}
.btn:hover{background:#0098d1}
.btn.green{background:#22a06b}.btn.green:hover{background:#1a8358}
.btn.orange{background:#f08c1f}.btn.orange:hover{background:#c47314}
.msg{font-size:12px;font-weight:600}
.msg.ok{color:#1a7a4f}.msg.err{color:#a82929}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:180px;padding:10px 0;border-bottom:1px solid #d6e4ef}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar-col .bars{display:flex;gap:2px;align-items:flex-end;height:140px;width:100%;justify-content:center}

.bar-col .lbl{font-size:10px;color:#6b7c8c;font-family:'Barlow Condensed',sans-serif;font-weight:600}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:14px}
.kpi .box{background:#f8fbfd;padding:12px 14px;border-radius:8px;border-left:4px solid #00AEEF}
.kpi .box.green{border-left-color:#22a06b}
.kpi .box.red{border-left-color:#d64545}
.kpi .box.orange{border-left-color:#f08c1f}
.kpi .box .l{font-size:11px;color:#6b7c8c;text-transform:uppercase;font-weight:600}
.kpi .box .v{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#003c56}
.phase-bar{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:13px}
.phase-bar .name{flex:0 0 260px;color:#003c56}
.phase-bar .fill{height:18px;background:#00AEEF;border-radius:3px;min-width:2px}
.phase-bar .cnt{font-weight:700;color:#005F88;min-width:40px}
tr.cf-row td{font-size:13px}
tr.cf-row.neg td{background:#fdecec}
#login{position:fixed;inset:0;background:#005F88;display:flex;align-items:center;justify-content:center;z-index:100}
#login .box{background:#fff;padding:36px;border-radius:12px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3);max-width:340px;width:90%}
#login h2{font-family:'Barlow Condensed',sans-serif;color:#005F88;margin-bottom:18px;font-size:22px}
#login input{width:100%;padding:12px;border:1px solid #cdd9e3;border-radius:6px;font-size:15px;margin-bottom:12px;font-family:'Barlow',sans-serif}
#login button{width:100%;background:#005F88;color:#fff;border:0;padding:12px;border-radius:6px;font-weight:600;cursor:pointer;font-size:15px}
#login button:hover{background:#003c56}
#login .err{color:#d64545;font-size:13px;margin-top:8px;min-height:18px}

const ENC_TOKEN='U2FsdGVkX194UJtfpYg8cvCjBafdRCJf+su7nO9ExDKeqIXt/lKaoQI7C5kekd6UwjyXN1YGhS+H4adcmq3lJAWhcC87lYckPgJPOdrMjJzukyH3U463Oio5GPJQpmzrljMBrJcs+TrT42ix9Ji8WQ==';
let TK=null;
async function decryptToken(pw){
  const raw=Uint8Array.from(atob(ENC_TOKEN),c=>c.charCodeAt(0));
  if(String.fromCharCode.apply(null,raw.slice(0,8))!=='Salted__')throw 0;
  const salt=raw.slice(8,16),ct=raw.slice(16);
  const pk=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},pk,384);
  const key=await crypto.subtle.importKey('raw',bits.slice(0,32),{name:'AES-CBC'},false,['decrypt']);
  return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-CBC',iv:bits.slice(32,48)},key,ct));
}

async function fetchAll(table){
  const recs=[];let offset='';
  do{
    const url='https://api.airtable.com/v0/'+BASE+'/'+encodeURIComponent(table)+'?returnFieldsByFieldId=true&pageSize=100'+(offset?'&offset='+offset:'');
    const r=await fetch(url,{headers:{Authorization:'Bearer '+TK}});
    if(!r.ok)throw new Error('HTTP '+r.status+' '+table);
    const j=await r.json();
    recs.push.apply(recs,j.records);
    offset=j.offset||'';
  }while(offset);
  return recs;
}
async function patchRecord(table,recordId,fields){
  const url='https://api.airtable.com/v0/'+BASE+'/'+encodeURIComponent(table)+'/'+recordId+'?returnFieldsByFieldId=true';
  const r=await fetch(url,{method:'PATCH',headers:{Authorization:'Bearer '+TK,'Content-Type':'application/json'},body:JSON.stringify({fields})});
  if(!r.ok)throw new Error('HTTP '+r.status+': '+(await r.text()));
  return r.json();
}
async function createRecord(table,fields){
  const url='https://api.airtable.com/v0/'+BASE+'/'+encodeURIComponent(table)+'?returnFieldsByFieldId=true';

async function autoFixFaltaPagamento(){
  // Casos em "Encerrado PARA COBRANÇA" que já têm cobrança de Entrada com NF emitida → mover para "Encerrado - Falta Pagamento"
  const fixed=[];
  for(const c of DATA.casos){
    if(fv(c,F.caso.fase)!=='Encerrado PARA COBRANÇA')continue;
    const cobs=COBS_BY_CASO[c.id]||[];
    const hasNF=cobs.some(co=>!isSaida(co)&&fv(co,F.cob.nfEmitida)===true);
    if(!hasNF)continue;
    try{
      const fields={};fields[F.caso.fase]='Encerrado - Falta Pagamento';
      await patchRecord(TBL.casos,c.id,fields);
      c.fields[F.caso.fase]='Encerrado - Falta Pagamento';
      fixed.push(c);
    }catch(e){}
  }
  for(const c of fixed)showToast('Corrigido → Falta Pagamento: '+casoNome(c),false);
}

async function autoMarkDevedores(){
  const t0=today();const changes=[];
  const toUpdateCob=[];const toUpdateCaso=new Set();
  for(const co of DATA.cob){
    if(isSaida(co))continue;
    if(fv(co,F.cob.nfEmitida)!==true)continue;
    if(fv(co,F.cob.recebido)===true||fv(co,F.cob.pago)===true)continue;
    const d=parseDate(fv(co,F.cob.dataCobranca));
    if(!d||daysBetween(d,t0)<=90)continue;
    const cid=fv(co,F.cob.caso);if(!cid||!cid[0])continue;
    const c=casoById(cid[0]);if(!c)continue;
    if(fv(c,F.caso.fase)==='Devedor'&&fv(co,F.cob.nfRetida)===true)continue;
    changes.push({caso:c,dias:daysBetween(d,t0)});
    if(fv(co,F.cob.nfRetida)!==true)toUpdateCob.push(co.id);
    if(fv(c,F.caso.fase)!=='Devedor')toUpdateCaso.add(c.id);
  }
  for(const cid of toUpdateCaso){
    try{const fields={};fields[F.caso.fase]='Devedor';await patchRecord(TBL.casos,cid,fields);
      const c=casoById(cid);if(c)c.fields[F.caso.fase]='Devedor';
    }catch(e){}
  }
  for(const coid of toUpdateCob){
    try{const fields={};fields[F.cob.nfRetida]=true;await patchRecord(TBL.cob,coid,fields);
      const co=DATA.cob.find(x=>x.id===coid);if(co)co.fields[F.cob.nfRetida]=true;
    }catch(e){}
  }
  const uniq=[...new Set(changes.map(x=>x.caso.id))].map(id=>changes.find(x=>x.caso.id===id));
  for(const ch of uniq)showToast(t('autoDev')+': '+casoNome(ch.caso)+' ('+ch.dias+'d)',true);
}

const fmtDate=d=>{if(!d)return '—';const dt=d instanceof Date?d:parseDate(d);return dt?dt.toLocaleDateString(LANG==='pt'?'pt-BR':'en-US'):'—';};
const today=()=>{const d=new Date();d.setHours(0,0,0,0);return d;};
const parseDate=s=>{if(!s)return null;if(typeof s==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(s)){const[y,m,d]=s.split('-');return new Date(+y,+m-1,+d);}return new Date(s);};
const daysBetween=(a,b)=>Math.floor((b-a)/86400000);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const monthKey=d=>{const dt=d instanceof Date?d:new Date(d);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');};
const monthLabel=k=>{if(!k)return t('allMonths');const[y,m]=k.split('-');return new Date(+y,+m-1,1).toLocaleDateString(LANG==='pt'?'pt-BR':'en-US',{month:'long',year:'numeric'});};
const todayISO=()=>new Date().toISOString().slice(0,10);
const nowStamp=()=>{const d=new Date();const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());};

}

function computeOverview(){
  let entradas=0,saidas=0,aberto=0;
  const lEnt=[],lSai=[],lAb=[];
  for(const co of DATA.cob){
    if(isSaida(co)){
      const dp=fv(co,F.cob.dataPag),dc=fv(co,F.cob.dataCobranca);
      if(inMonth(dp)||inMonth(dc)){
        const v=num(fv(co,F.cob.valorPag))||num(fv(co,F.cob.valorReceber));
        saidas+=v;
        const marker=String(fv(co,F.cob.numeroNF)||'');
        let nome=fv(co,F.cob.nome)||'';
        let isRet=false;
        if(/^RETIRADA:/i.test(marker)){nome='Adiantamento pró-labore: '+marker.replace(/^RETIRADA:\s*/i,'');isRet=true;}
        else if(/^CF:/i.test(marker)){nome='Custo fixo: '+marker.replace(/^CF:\s*/i,'');}
        else{
          const assist=assistNameOfCob(co);
          if(assist)nome='Assistente: '+assist+(nome?' — '+nome:'');
          else if(!nome)nome='—';
        }
        lSai.push({nome,valor:v,data:dp||dc,cob:co,pago:fv(co,F.cob.pago)===true,isRet});
      }
    }else if(fv(co,F.cob.recebido)===true){
      const dc=fv(co,F.cob.dataReceb)||fv(co,F.cob.dataCobranca);
      if(inMonth(dc)){
        const v=num(fv(co,F.cob.valorReceber));
        entradas+=v;
        lEnt.push({nome:fv(co,F.cob.nome)||'—',valor:v,data:dc,cob:co});
      }
    }
  }
  // Em Aberto = mesmos critérios da aba Pendentes
  const t0=today();
  for(const co of DATA.cob){
    if(isSaida(co))continue;
    if(fv(co,F.cob.nfEmitida)!==true)continue;
    if(fv(co,F.cob.recebido)===true||fv(co,F.cob.pago)===true)continue;
    if(num(fv(co,F.cob.valorReceber))<=0)continue;
    const cid=fv(co,F.cob.caso);const c=cid&&cid[0]?casoById(cid[0]):null;
    if(c&&fv(c,F.caso.fase)==='Devedor')continue;
    const d=parseDate(fv(co,F.cob.dataCobranca));
    const dias=d?daysBetween(d,t0):0;
    if(d&&dias>90)continue;
    aberto+=num(fv(co,F.cob.valorReceber));
    lAb.push({nome:fv(co,F.cob.nome)||'—',valor:num(fv(co,F.cob.valorReceber)),data:d,cob:co,dias,caso:c});
  }
  return {entradas,saidas,aberto,lucro:entradas-saidas,lEnt,lSai,lAb};
}

const FASES_POS_PERICIA=['Ativo - Pós Perícia - Aguardando Laudo','Para cobrança pós perícia, falta manifestação','Ativo - Laudo já publicado'];

// Detecção de cliente que exige pedido/autorização antes da NF
function pedidoInfo(caso){
  const cl=cliOfCaso(caso);
  const cliNome=cl?String(fv(cl,F.cli.nome)||''):'';
  const up=cliNome.toUpperCase();
  let tipo=null,instr=null;
  if(up.indexOf('MOURA DUBEUX')>=0||up.indexOf('MOURA DOUBEX')>=0||/^MD\s|^MD CE/.test(up)){
    tipo='SAP';instr='Solicitar pedido SAP 4500xxxxxx — contato: elissonete.bessa@mouradubeux.com.br';
  }else if(up.indexOf('PARANGABA')>=0){
    tipo='SAP';instr='Solicitar pedido SAP 4500xxxxxx';
  }else if(up.indexOf('COBAP')>=0){
    tipo='PC';instr='Solicitar Pedido de Compra (5 dígitos)';
  }else if(up.indexOf('SERVIS')>=0||up.indexOf('SERVTEC')>=0){
    tipo='PED';instr='Solicitar nº de pedido';
  }else if(cl&&fv(cl,F.cli.confirmar)===true){
    tipo='AUTH';instr='Solicitar autorização antes de emitir NF';
  }
  if(!tipo)return null;
  const ref=cl?fv(cl,F.cli.ref):null;
  return {tipo,instr,ref};
}
function pedidoJaRecebido(caso){
  const obs=String(fv(caso,F.caso.obs)||'');
  return /pedido n[ºo°]?\s*\S+\s*recebido/i.test(obs);
}
const hasInicialPaga=cobs=>cobs.some(co=>!isSaida(co)&&fv(co,F.cob.recebido)===true&&String(tipoPagLabel(co)).toLowerCase().indexOf('inicia')>=0);
const hasFinalCob=cobs=>cobs.some(co=>!isSaida(co)&&(String(tipoPagLabel(co)).toLowerCase().indexOf('final')>=0||String(tipoPagLabel(co)).indexOf('100')>=0));
function caseRemarcFee(caso){
  const dp=fv(caso,F.caso.dataPericia);
  const n=Array.isArray(dp)?dp.length:(dp?1:0);
  return Math.max(0,n-1)*500;
}

function computeCobrar(){
  const enc=[],ini=[],finais=[],pedido=[];
  for(const c of DATA.casos){
    const fase=fv(c,F.caso.fase);
    if(fase==='Devedor'||fase==='Arquivado (serviço cancelado)'||fase==='Encerrado - Pago')continue;
    const isEnc=fase==='Encerrado PARA COBRANÇA';
    const fmt=fv(c,F.caso.formato);
    const is5050=fmt&&String(fmt).indexOf('50/50')>=0;
    const pInfo=pedidoInfo(c);
    const needsPedido=pInfo&&!pedidoJaRecebido(c);
    const cobs=COBS_BY_CASO[c.id]||[];
    let item=null,destCat=null;
    // Cat 3 check first: 50/50 with iniciais paid, finais missing — across multiple phases
    const fasesFinal5050=['Encerrado PARA COBRANÇA','Encerrado - Falta Pagamento'];
    const fasesFinal5050All=FASES_POS_PERICIA.concat(fasesFinal5050);
    if(is5050&&fasesFinal5050All.indexOf(fase)>=0&&hasInicialPaga(cobs)&&!hasFinalCob(cobs)){
      const remarc=caseRemarcFee(c);
      item={caso:c,valor:num(fv(c,F.caso.valor))/2+remarc,tipo:'50% Finais',remarc};
      destCat=finais;
    }else if(isEnc){
      const remarc=caseRemarcFee(c);
      const base=is5050?num(fv(c,F.caso.valor))/2:num(fv(c,F.caso.valor));
      item={caso:c,valor:base+remarc,tipo:is5050?'50% Finais':t('fmt100'),remarc};
      destCat=enc;
    }else if(is5050&&fase&&fase.indexOf('Ativo')>=0&&FASES_POS_PERICIA.indexOf(fase)<0){
      const hasEntrada=cobs.some(co=>!isSaida(co)&&num(fv(co,F.cob.valorReceber))>0);
      if(!hasEntrada){
        item={caso:c,valor:num(fv(c,F.caso.valor))/2,tipo:'50% Iniciais'};
        destCat=ini;
      }
    }
    if(!item)continue;
    if(needsPedido){item.pInfo=pInfo;pedido.push(item);}
    else destCat.push(item);
  }
  return {enc,ini,finais,pedido};
}

// Auto-encerrar casos cuja manifestação ao laudo passou há mais de 3 dias
async function autoEncerrarPosManifestacao(){
  const t0=today();const t3=new Date(t0);t3.setDate(t3.getDate()-3);
  const fixed=[];
  for(const c of DATA.casos){
    const fase=fv(c,F.caso.fase);

    const prazos=PRAZOS_BY_CASO[c.id]||[];

      if(tipoStr.indexOf('manifest')<0||tipoStr.indexOf('laudo')<0)return false;
      const d=parseDate(fv(p,F.prazo.data));

      c.fields[F.caso.fase]='Encerrado PARA COBRANÇA';

}

function computeDevedores(){

function avgRetiradas3m(){
  // média de saídas tipo "pró-labore"/"retirada" últimos 3 meses
  const t0=today();const t3=new Date(t0);t3.setMonth(t3.getMonth()-3);
  let total=0;const months=new Set();
  for(const co of DATA.cob){
    if(!isSaida(co))continue;

}

function computePrevisao(){
  const t0=today();const t30=new Date(t0);t30.setDate(t30.getDate()+30);
  // A) Já cobrados
  const jaCobrados=[];
  for(const co of DATA.cob){
    if(isSaida(co))continue;
    if(fv(co,F.cob.recebido)===true||fv(co,F.cob.pago)===true)continue;
    if(fv(co,F.cob.nfEmitida)!==true)continue;
    const v=num(fv(co,F.cob.valorReceber));if(v<=0)continue;
    const cid=fv(co,F.cob.caso);const c=cid&&cid[0]?casoById(cid[0]):null;
    if(c&&fv(c,F.caso.fase)==='Devedor')continue;
    const d=parseDate(fv(co,F.cob.dataCobranca));
    const age=d?daysBetween(d,t0):0;
    let p;if(age<30)p=0.9;else if(age<60)p=0.7;else if(age<90)p=0.4;else continue;
    const dso=20;
    const expectedDate=new Date(t0);expectedDate.setDate(expectedDate.getDate()+Math.max(5,dso-age));
    jaCobrados.push({nome:c?casoNome(c):(fv(co,F.cob.nome)||'—'),valor:v,prob:p,esperado:v*p,age,cob:co,expectedDate});
  }
  // B) Cobranças previstas: perícias agendadas próximos 30d em casos 50/50 sem parte final cobrada → vão gerar cobrança
  const cobrPrev=[];
  for(const p of DATA.prazo){
    const d=parseDate(fv(p,F.prazo.data));
    if(!d||d<t0||d>t30)continue;
    const tp=String(fv(p,F.prazo.tipo)||'').toLowerCase();
    if(tp.indexOf('perícia')<0&&tp.indexOf('pericia')<0)continue;
    const cid=fv(p,F.prazo.caso);if(!cid||!cid[0])continue;
    const c=casoById(cid[0]);if(!c)continue;
    const fmt=fv(c,F.caso.formato);
    if(!fmt||String(fmt).indexOf('50/50')<0)continue;
    const casoVal=num(fv(c,F.caso.valor));if(!casoVal)continue;
    const cobs=COBS_BY_CASO[c.id]||[];
    const hasFinal=cobs.some(co=>!isSaida(co)&&tipoCob(co).indexOf('final')>=0);
    if(hasFinal)continue;
    const est=new Date(d);est.setDate(est.getDate()+7);
    cobrPrev.push({caso:c,valor:casoVal/2,dataEst:est,prob:0.8});
  }
  // Pagamentos
  const lPag=[];let pericias=0;
  for(const p of DATA.prazo){
    const d=parseDate(fv(p,F.prazo.data));
    if(!d||d<t0||d>t30)continue;
    const tp=String(fv(p,F.prazo.tipo)||'').toLowerCase();
    if(tp.indexOf('perícia')<0&&tp.indexOf('pericia')<0)continue;
    const vCerto=num(fv(p,F.prazo.valorAss));
    const v=vCerto||800;
    pericias+=v;
    const cid=fv(p,F.prazo.caso);const c=cid&&cid[0]?casoById(cid[0]):null;
    lPag.push({data:d,valor:v,nome:c?casoNome(c):'—',certo:vCerto>0});
  }
  const cfs=activeCF();
  const lCF=cfs.map(cf=>({nome:fv(cf,F.cf.nome)||'—',valor:num(fv(cf,F.cf.valor)),dia:fv(cf,F.cf.dia)||null,rec:cf}));
  const custosFixos=lCF.reduce((s,x)=>s+x.valor,0);
  const retiradasMed=avgRetiradas3m();
  // Cashflow dia a dia
  const events=[];
  for(const r of jaCobrados)events.push({date:r.expectedDate,ev:'Recebimento: '+r.nome,entrada:r.esperado,saida:0});
  for(const r of cobrPrev){const est2=new Date(r.dataEst);est2.setDate(est2.getDate()+20);events.push({date:est2,ev:'Receb. futuro: '+casoNome(r.caso),entrada:r.valor*r.prob,saida:0});}
  for(const p of lPag)events.push({date:p.data,ev:'Perícia: '+p.nome,entrada:0,saida:p.valor});
  for(const cf of lCF){
    if(cf.dia){
      const now=new Date(t0);const d=new Date(now.getFullYear(),now.getMonth(),Math.min(28,cf.dia));
      if(d<t0)d.setMonth(d.getMonth()+1);
      if(d<=t30)events.push({date:d,ev:'Custo fixo: '+cf.nome,entrada:0,saida:cf.valor});
    }
  }
  events.sort((a,b)=>a.date-b.date);
  const saldoInicial=getSaldo().valor||0;
  let acc=saldoInicial;let minSaldo=saldoInicial;let minDate=t0;
  for(const e of events){acc+=e.entrada-e.saida;e.saldo=acc;if(acc<minSaldo){minSaldo=acc;minDate=e.date;}}
  const recebidos=jaCobrados.reduce((s,x)=>s+x.esperado,0)+cobrPrev.reduce((s,x)=>s+x.valor*x.prob,0);
  const pagamentos=pericias+custosFixos+retiradasMed;
  const saldo=recebidos-pagamentos;
  // Retirada segura: ponto mais baixo do saldo projetado - reserva de 1 mês de custos fixos
  const retirada=Math.max(0,minSaldo-custosFixos);
  return {jaCobrados,cobrPrev,lPag,lCF,custosFixos,retiradasMed,pericias,events,minSaldo,minDate,recebidos,pagamentos,saldo,retirada,saldoInicial};
}

function getSaldo(){try{return JSON.parse(localStorage.getItem('hp_saldo')||'{}');}catch(e){return {};}}
function setSaldo(valor,data){localStorage.setItem('hp_saldo',JSON.stringify({valor:parseFloat(valor)||0,data:data||todayISO()}));}
function getSnapshots(){try{return JSON.parse(localStorage.getItem('hp_snapshots')||'[]');}catch(e){return [];}}
function addSnapshot(s){const arr=getSnapshots().filter(x=>x.mes!==s.mes);arr.push(s);arr.sort((a,b)=>a.mes.localeCompare(b.mes));localStorage.setItem('hp_snapshots',JSON.stringify(arr));}

function fecharMes(){
  const mk=SELECTED_MONTH||monthKey(new Date());
  const saldoFinal=prompt('Saldo bancário no fechamento do mês '+monthLabel(mk)+' (R$):');
  if(saldoFinal===null)return;
  const val=parseFloat(saldoFinal)||0;
  // Calcular receita / saídas operacionais / retiradas do mês
  let receita=0,saidasOp=0,retiradas=0;
  for(const co of DATA.cob){
    if(isSaida(co)){
      const d=fv(co,F.cob.dataPag)||fv(co,F.cob.dataCobranca);
      if(!d||monthKey(d)!==mk)continue;
      const v=num(fv(co,F.cob.valorPag))||num(fv(co,F.cob.valorReceber));
      const marker=String(fv(co,F.cob.numeroNF)||'');
      if(/^RETIRADA:/i.test(marker))retiradas+=v;
      else saidasOp+=v;
    }else if(fv(co,F.cob.recebido)===true){
      const d=fv(co,F.cob.dataReceb)||fv(co,F.cob.dataCobranca);
      if(!d||monthKey(d)!==mk)continue;
      receita+=num(fv(co,F.cob.valorReceber));
    }
  }
  const resultado=receita-saidasOp-retiradas;
  addSnapshot({mes:mk,saldoFinal:val,receita,saidasOp,retiradas,resultado,data:todayISO()});
  setSaldo(val,todayISO());
  showToast('Mês '+monthLabel(mk)+' fechado. Resultado: '+fmtBRL(resultado),false);
  render();
}

function computeAlerts(){
  const a=[];
  const t0=today();
  for(const c of DATA.casos){
    const fmt=fv(c,F.caso.formato);const fase=fv(c,F.caso.fase);
    if(fmt&&String(fmt).indexOf('50/50')>=0&&fase&&(fase.indexOf('Pós')>=0||fase.indexOf('Laudo')>=0||fase.indexOf('Encerrado')>=0)){
      const cobs=COBS_BY_CASO[c.id]||[];
      const hasEnt=cobs.some(co=>!isSaida(co)&&fv(co,F.cob.recebido)===true);
      if(!hasEnt)a.push({type:'forgot50',caso:c});
    }
  }
  // Vencida 60+
  for(const co of DATA.cob){
    if(isSaida(co))continue;
    if(fv(co,F.cob.nfEmitida)!==true)continue;
    if(fv(co,F.cob.recebido)===true||fv(co,F.cob.pago)===true)continue;
    const d=parseDate(fv(co,F.cob.dataCobranca));if(!d)continue;
    const dias=daysBetween(d,t0);
    if(dias>=60&&dias<=90){
      const cid=fv(co,F.cob.caso);const c=cid&&cid[0]?casoById(cid[0]):null;
      a.push({type:'vencida60',caso:c,cob:co,dias});
    }
  }
  // Perícia próx 2 dias
  const t2=new Date(t0);t2.setDate(t2.getDate()+2);
  for(const p of DATA.prazo){
    const d=parseDate(fv(p,F.prazo.data));
    if(!d||d<t0||d>t2)continue;
    const tp=String(fv(p,F.prazo.tipo)||'').toLowerCase();
    if(tp.indexOf('perícia')<0&&tp.indexOf('pericia')<0)continue;
    const cid=fv(p,F.prazo.caso);const c=cid&&cid[0]?casoById(cid[0]):null;
    a.push({type:'periciaProx',caso:c,data:d});
  }
  return a;
}

function computePhaseDistribution(){
  const m={};
  for(const c of DATA.casos){const f=fv(c,F.caso.fase)||'—';m[f]=(m[f]||0)+1;}
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}

// ========== ROADMAP ==========
function caseRoadmap(caso){
  const prazos=(PRAZOS_BY_CASO[caso.id]||[]).map(p=>({
    data:parseDate(fv(p,F.prazo.data)),
    tipo:(function(){const v=fv(p,F.prazo.tipo);return Array.isArray(v)?v.join(' ').toLowerCase():String(v||'').toLowerCase();})()
  })).filter(p=>p.data).sort((a,b)=>a.data-b.data);
  const pick=keys=>prazos.filter(p=>keys.some(k=>p.tipo.indexOf(k)>=0)).map(p=>p.data);
  const qDates=pick(['quesito','assist']);
  const pDates=pick(['perícia','pericia','vistoria','inspeç','inspec']);
  const mDates=pick(['manifestação ao laudo','manifestacao ao laudo','manifest','laudo','alegaç','alegac']);
  const mcDates=pick(['complement']);
  if(pDates.length===0){const dp=fv(caso,F.caso.dataPericia);if(Array.isArray(dp))dp.forEach(x=>{const d=parseDate(x);if(d)pDates.push(d);});else if(dp){const d=parseDate(dp);if(d)pDates.push(d);}}
  const t0=today();
  const stages=[
    {key:'q',name:t('quesitos'),dates:qDates},
    {key:'p',name:t('pericia'),dates:pDates},
    {key:'m',name:t('manifest'),dates:mDates}
  ];
  if(mcDates.length>0)stages.push({key:'mc',name:t('manifestC'),dates:mcDates});
  for(const s of stages){
    if(s.dates.length===0){s.status='future';s.display=null;continue;}
    const last=s.dates[s.dates.length-1];
    s.display=last;s.status=last<t0?'done':'future';
  }
  // Se alguma etapa posterior está concluída, etapas anteriores vazias viram "done" implícito
  let lastDoneIdx=-1;
  for(let i=0;i<stages.length;i++)if(stages[i].status==='done')lastDoneIdx=i;
  for(let i=0;i<lastDoneIdx;i++)if(stages[i].status==='future'&&stages[i].dates.length===0)stages[i].status='done';
  let found=false;for(const s of stages)if(s.status!=='done'&&!found){s.status='current';found=true;}
  const remarc=Math.max(0,pDates.length-1);
  const done=stages.filter(s=>s.status==='done').length;
  return {stages,remarc,progress:done/stages.length*100};
}
function renderRoadmap(caso){
  const r=caseRoadmap(caso);
  const isNovo=String(casoNome(caso)).toUpperCase().indexOf('NOVO CASO')>=0;
  const stagesHtml=r.stages.map(s=>{
    const ico=s.status==='done'?'✓':(s.status==='current'?'●':'');
    const extras=s.key==='p'&&r.remarc>0?'<div class="extras">+'+r.remarc+' '+t('remarc')+' (+'+fmtBRL(r.remarc*500)+')</div>':'';
    return '<div class="stage '+s.status+'"><div class="dot">'+ico+'</div><div class="name">'+s.name+'</div><div class="date">'+(s.display?fmtDate(s.display):'—')+'</div>'+extras+'</div>';
  }).join('');
  return (isNovo?'<div style="margin-bottom:8px"><span class="tag purple">'+t('newCase')+'</span></div>':'')+
    '<h4>Roadmap</h4>'+
    '<div class="roadmap"><div class="track"></div><div class="fill" style="width:calc('+(r.progress*0.84)+'% + 0px)"></div><div class="stages">'+stagesHtml+'</div></div>'+
    '<div class="pbar"><div style="width:'+r.progress+'%"></div></div>'+
    '<div class="progress-lbl">'+t('progress')+': '+Math.round(r.progress)+'%</div>';
}

async function handleSave(btn){
  const form=btn.closest('[data-form]');
  const msg=form.querySelector('.msg');
  const type=form.dataset.form;
  msg.textContent='...';msg.className='msg';
  try{
    if(type==='nf'){
      const cobId=form.dataset.cobid;const casoId=form.dataset.casoid;
      const nfNum=form.querySelector('[name=nfNum]').value;
      const nfVal=parseFloat(form.querySelector('[name=nfVal]').value)||0;
      const dCob=form.querySelector('[name=dCob]').value;
      const fields={};
      fields[F.cob.nfEmitida]=true;
      if(nfNum)fields[F.cob.numeroNF]=nfNum;
      if(nfVal)fields[F.cob.valorBrutoNF]=nfVal;
      if(dCob)fields[F.cob.dataCobranca]=dCob;
      if(cobId)await patchRecord(TBL.cob,cobId,fields);
      else{
        fields[F.cob.caso]=[casoId];fields[F.cob.valorReceber]=nfVal;fields[F.cob.tipo]='Entrada';
        await createRecord(TBL.cob,fields);
      }
    }else if(type==='pay'){
      const cobId=form.dataset.cobid;
      const fields={};fields[F.cob.recebido]=true;
      const d=form.querySelector('[name=dRec]').value;if(d)fields[F.cob.dataReceb]=d;
      await patchRecord(TBL.cob,cobId,fields);
      // Lógica de transição de fase
      const casoId=form.dataset.casoid;
      if(casoId){
        const c=casoById(casoId);
        const cob=DATA.cob.find(x=>x.id===cobId);
        const tp=cob?String(tipoPagLabel(cob)).toLowerCase():'';
        const isInicial=tp.indexOf('inicia')>=0;
        const fase=c?fv(c,F.caso.fase):'';
        const terminal=fase==='Encerrado PARA COBRANÇA'||fase==='Encerrado - Falta Pagamento'||fase==='Devedor';
        if(c&&!isInicial&&terminal){
          const cf={};cf[F.caso.fase]='Encerrado - Pago';
          await patchRecord(TBL.casos,casoId,cf);
        }
      }
    }else if(type==='paid'){
      const fields={};fields[F.cob.pago]=true;
      const d=form.querySelector('[name=dPag]').value;if(d)fields[F.cob.dataPag]=d;
      await patchRecord(TBL.cob,form.dataset.cobid,fields);
    }else if(type==='note'){
      const txt=form.querySelector('[name=note]').value.trim();if(!txt){msg.textContent='';return;}
      const caso=casoById(form.dataset.casoid);const cur=fv(caso,F.caso.obs)||'';
      const fields={};fields[F.caso.obs]='['+nowStamp()+'] '+txt+'\n'+cur;
      await patchRecord(TBL.casos,form.dataset.casoid,fields);
    }else if(type==='saldo'){
      const val=parseFloat(form.querySelector('[name=val]').value)||0;
      const d=form.querySelector('[name=d]').value||todayISO();
      setSaldo(val,d);
      msg.textContent=t('saved');msg.className='msg ok';
      setTimeout(render,400);
      return;
    }else if(type==='pedido'){
      const numPedido=form.querySelector('[name=numPedido]').value.trim();
      if(!numPedido){msg.textContent='Digite o número';msg.className='msg err';return;}
      const casoId=form.dataset.casoid;
      const caso=casoById(casoId);
      const cur=fv(caso,F.caso.obs)||'';
      const newText='['+nowStamp()+'] Pedido nº '+numPedido+' recebido\n'+cur;
      const fields={};fields[F.caso.obs]=newText;
      await patchRecord(TBL.casos,casoId,fields);
    }else if(type==='cfpay'){
      const val=parseFloat(form.querySelector('[name=val]').value)||0;
      const d=form.querySelector('[name=d]').value||todayISO();
      const name=form.dataset.cfname;
      const fields={};
      fields[F.cob.numeroNF]='CF: '+name;
      fields[F.cob.tipo]='Saída';
      fields[F.cob.valorPag]=val;
      fields[F.cob.dataPag]=d;
      fields[F.cob.pago]=true;
      await createRecord(TBL.cob,fields);
    }else if(type==='retirada'){
      const val=parseFloat(form.querySelector('[name=val]').value)||0;
      const d=form.querySelector('[name=d]').value;
      const desc=form.querySelector('[name=desc]').value;
      const fields={};
      fields[F.cob.numeroNF]='RETIRADA: '+(desc||'Retirada pessoal');
      fields[F.cob.tipo]='Saída';
      fields[F.cob.valorPag]=val;
      fields[F.cob.dataPag]=d||todayISO();
      fields[F.cob.pago]=true;
      await createRecord(TBL.cob,fields);
    }
    msg.textContent=t('saved');msg.className='msg ok';
    setTimeout(loadData,600);
  }catch(e){msg.textContent=t('saveErr')+': '+e.message;msg.className='msg err';}
}

    '<div style="font-size:12px;color:#6b7c8c">'+(saldo.data?'Atualizado em '+fmtDate(saldo.data):'Nunca atualizado')+'</div></div>'+

function caseTable(rows,opts){
  if(!rows.length)return '<div class="empty">'+t('noData')+'</div>';
  const cols=opts.cols;
  const head='<tr>'+cols.map(k=>'<th'+(k==='value'||k==='days'?' class="right"':'')+'>'+t(k)+'</th>').join('')+'</tr>';
  const sorted=sortRows(rows);
  let lastClient=null;
  const body=sorted.map((r,i)=>{
    const rid=opts.prefix+'-'+i;
    const expanded=EXPANDED_ROW===rid;
    let groupHead='';
    if(SORT_MODE==='client'&&r.caso){
      const cn=cliNomeOfCaso(r.caso);
      if(cn!==lastClient){lastClient=cn;groupHead='<tr class="group-head"><td colspan="'+cols.length+'">'+esc(cn)+'</td></tr>';}
    }
    const tds=cols.map(k=>{
      if(k==='case'){
        let extra='';
        if(r.caso){
          const dp=fv(r.caso,F.caso.dataPericia);
          const n=Array.isArray(dp)?dp.length:(dp?1:0);
          if(n>1)extra+=' <span class="tag orange">'+(n-1)+' remarc</span>';
        }
        if(r.cob&&fv(r.cob,F.cob.nfRetida)===true)extra+=' <span class="tag red">'+t('nfRetida')+'</span>';
        if(r.caso&&fv(r.caso,F.caso.manifNos)===true)extra+=' <span class="tag gray">manifestação sem nós</span>';
        return '<td>'+caseCell(r.caso)+extra+'</td>';
      }
      if(k==='client')return '<td>'+esc(r.caso?cliNomeOfCaso(r.caso):'—')+'</td>';
      if(k==='phase')return '<td>'+esc(r.caso?(fv(r.caso,F.caso.fase)||'—'):'—')+'</td>';
      if(k==='type')return '<td><span class="tag blue">'+(r.tipo||'—')+'</span></td>';
      if(k==='tipoPag'){const tp=r.cob?tipoPagLabel(r.cob):'';return '<td>'+(tp?'<span class="tag purple">'+esc(tp)+'</span>':'—')+'</td>';}
      if(k==='date')return '<td>'+fmtDate(r.cob?fv(r.cob,F.cob.dataCobranca):null)+'</td>';
      if(k==='days')return '<td class="right">'+daysBadge(r.dias)+'</td>';
      if(k==='value')return '<td class="right">'+fmtBRL(r.valor!=null?r.valor:(r.cob?num(fv(r.cob,F.cob.valorReceber)):0))+'</td>';
      return '<td></td>';
    }).join('');
    let det='';
    if(expanded&&r.caso){
      det+=renderRoadmap(r.caso);
      if(opts.form==='nf')det+=renderNFForm(r.cob,r.caso);
      if(opts.form==='pay'&&r.cob)det+=renderPayForm(r.cob,r.caso);
      det+=renderNoteForm(r.caso);
    }
    const mainTr='<tr class="clickable'+(expanded?' expanded':'')+'" data-row="'+rid+'">'+tds+'</tr>';
    const detTr=expanded?'<tr><td colspan="'+cols.length+'" style="padding:0"><div class="detail">'+det+'</div></td></tr>':'';
    return groupHead+mainTr+detTr;
  }).join('');
  return '<table><thead>'+head+'</thead><tbody>'+body+'</tbody></table>';
}

  html+='<div class="section"><h2>2. '+t('s50')+' — '+fmtBRL(sum(g.ini))+' ('+g.ini.length+')</h2>'+caseTable(g.ini,{cols:['case','client','phase','type','value'],prefix:'ini',form:'nf'})+'</div>';

function lastReceivedCob(){
  let best=null,bestD=null;
  for(const co of DATA.cob){
    if(isSaida(co))continue;
    if(fv(co,F.cob.recebido)!==true)continue;
    const d=parseDate(fv(co,F.cob.dataReceb));
    if(!d)continue;
    if(!bestD||d>bestD){bestD=d;best=co;}
  }
  return best?{cob:best,data:bestD}:null;
}

let HIST_FROM=null,HIST_TO=null;
function renderHistorico(){
  const now=new Date();
  if(!HIST_FROM){const d=new Date(now.getFullYear(),now.getMonth()-2,1);HIST_FROM=d.toISOString().slice(0,10);}
  if(!HIST_TO)HIST_TO=todayISO();
  const from=parseDate(HIST_FROM),to=parseDate(HIST_TO);
  const rows=[];
  let totEnt=0,totSai=0;
  for(const co of DATA.cob){
    if(isSaida(co)){
      const d=parseDate(fv(co,F.cob.dataPag)||fv(co,F.cob.dataCobranca));
      if(!d||d<from||d>to)continue;
      const v=num(fv(co,F.cob.valorPag))||num(fv(co,F.cob.valorReceber));
      const marker=String(fv(co,F.cob.numeroNF)||'');
      let nome=fv(co,F.cob.nome)||'';
      let cat='Saída';
      if(/^RETIRADA:/i.test(marker)){nome='Adiantamento pró-labore: '+marker.replace(/^RETIRADA:\s*/i,'');cat='Retirada';}
      else if(/^CF:/i.test(marker)){nome='Custo fixo: '+marker.replace(/^CF:\s*/i,'');cat='Custo Fixo';}
      else{
        const a=assistNameOfCob(co);
        if(a)nome='Assistente: '+a+(nome?' — '+nome:'');
      }
      rows.push({data:d,tipo:'saida',cat,nome,valor:v});
      totSai+=v;
    }else if(fv(co,F.cob.recebido)===true){
      const d=parseDate(fv(co,F.cob.dataReceb)||fv(co,F.cob.dataCobranca));
      if(!d||d<from||d>to)continue;
      const v=num(fv(co,F.cob.valorReceber));
      rows.push({data:d,tipo:'entrada',cat:'Entrada',nome:fv(co,F.cob.nome)||'—',valor:v});
      totEnt+=v;
    }
  }
  rows.sort((a,b)=>b.data-a.data);
  const saldo=totEnt-totSai;
  let html='<div class="section"><h2>Histórico de Entradas e Saídas</h2>'+
    '<div class="toolbar">'+
    '<label>De: <input type="date" id="histFrom" value="'+HIST_FROM+'"></label>'+
    '<label>Até: <input type="date" id="histTo" value="'+HIST_TO+'"></label>'+
    '<button class="btn" id="histApply">Aplicar</button>'+
    '</div>'+
    '<div class="kpi">'+
    '<div class="box green"><div class="l">Entradas</div><div class="v">'+fmtBRL(totEnt)+'</div></div>'+
    '<div class="box red"><div class="l">Saídas</div><div class="v">'+fmtBRL(totSai)+'</div></div>'+
    '<div class="box '+(saldo>=0?'green':'red')+'"><div class="l">Saldo</div><div class="v">'+fmtBRL(saldo)+'</div></div>'+
    '<div class="box"><div class="l">Operações</div><div class="v">'+rows.length+'</div></div>'+
    '</div>'+
    (rows.length?'<table><thead><tr><th>Data</th><th>Tipo</th><th>Descrição</th><th class="right">Entrada</th><th class="right">Saída</th></tr></thead><tbody>'+
    rows.map(r=>{
      const tagCls=r.tipo==='entrada'?'green':(r.cat==='Retirada'?'orange':(r.cat==='Custo Fixo'?'blue':'red'));
      const nameStyle=r.cat==='Retirada'?' style="font-style:italic;color:#a35a07"':'';
      return '<tr><td>'+fmtDate(r.data)+'</td><td><span class="tag '+tagCls+'">'+r.cat+'</span></td><td'+nameStyle+'>'+esc(r.nome)+'</td><td class="right">'+(r.tipo==='entrada'?fmtBRL(r.valor):'')+'</td><td class="right">'+(r.tipo==='saida'?fmtBRL(r.valor):'')+'</td></tr>';
    }).join('')+'</tbody></table>':'<div class="empty">Nenhuma operação no período</div>')+
    '</div>';
  return html;
}

function renderFPA(){
  const t0=today();
  const buckets={a0:{c:0,v:0,l:t('aging0')},a30:{c:0,v:0,l:t('aging30')},a60:{c:0,v:0,l:t('aging60')},a90:{c:0,v:0,l:t('aging90')}};
  let totalCob=0,totalDev=0;
  for(const co of DATA.cob){
    if(isSaida(co))continue;
    if(fv(co,F.cob.nfEmitida)!==true)continue;
    totalCob++;
    if(fv(co,F.cob.recebido)!==true&&fv(co,F.cob.pago)!==true){
      const v=num(fv(co,F.cob.valorReceber));if(v<=0)continue;
      const d=parseDate(fv(co,F.cob.dataCobranca));if(!d)continue;
      const age=daysBetween(d,t0);
      const k=age<30?'a0':age<60?'a30':age<90?'a60':'a90';
      buckets[k].c++;buckets[k].v+=v;
      if(age>90)totalDev++;
    }
  }
  const byCli={};
  for(const co of DATA.cob){
    if(isSaida(co))continue;
    if(fv(co,F.cob.recebido)!==true)continue;
    const cid=fv(co,F.cob.caso);if(!cid||!cid[0])continue;
    const c=casoById(cid[0]);if(!c)continue;
    const cl=cliNomeOfCaso(c);
    byCli[cl]=(byCli[cl]||0)+num(fv(co,F.cob.valorReceber));
  }
  const top=Object.entries(byCli).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const totalRev=Object.values(byCli).reduce((a,b)=>a+b,0);
  const top3Sum=top.slice(0,3).reduce((s,x)=>s+x[1],0);
  const conc=totalRev?(top3Sum/totalRev*100).toFixed(1):'0';
  const year=new Date().getFullYear();
  const byMonth={};for(let m=1;m<=12;m++)byMonth[m]={e:0,s:0};
  for(const co of DATA.cob){
    if(isSaida(co)){
      const d=parseDate(fv(co,F.cob.dataPag)||fv(co,F.cob.dataCobranca));if(!d||d.getFullYear()!==year)continue;
      byMonth[d.getMonth()+1].s+=num(fv(co,F.cob.valorPag))||num(fv(co,F.cob.valorReceber));
    }else if(fv(co,F.cob.recebido)===true){
      const d=parseDate(fv(co,F.cob.dataReceb)||fv(co,F.cob.dataCobranca));if(!d||d.getFullYear()!==year)continue;
      byMonth[d.getMonth()+1].e+=num(fv(co,F.cob.valorReceber));
    }
  }
  const maxV=Math.max(1,...Object.values(byMonth).flatMap(x=>[x.e,x.s]));
  let dsoSum=0,dsoCnt=0;
  for(const co of DATA.cob){
    if(isSaida(co)||fv(co,F.cob.recebido)!==true)continue;
    const dc=parseDate(fv(co,F.cob.dataCobranca));const dr=parseDate(fv(co,F.cob.dataReceb));
    if(!dc||!dr)continue;dsoSum+=daysBetween(dc,dr);dsoCnt++;
  }
  const dso=dsoCnt?Math.round(dsoSum/dsoCnt):0;
  const now=new Date();const last6=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);last6.push({k:monthKey(d),lbl:d.toLocaleDateString(LANG==='pt'?'pt-BR':'en-US',{month:'short'}),e:0,s:0});}
  const l6m={};last6.forEach(x=>l6m[x.k]=x);
  for(const co of DATA.cob){
    if(isSaida(co)){
      const d=parseDate(fv(co,F.cob.dataPag)||fv(co,F.cob.dataCobranca));if(!d)continue;
      const k=monthKey(d);if(l6m[k])l6m[k].s+=num(fv(co,F.cob.valorPag))||num(fv(co,F.cob.valorReceber));
    }else if(fv(co,F.cob.recebido)===true){
      const d=parseDate(fv(co,F.cob.dataReceb)||fv(co,F.cob.dataCobranca));if(!d)continue;
      const k=monthKey(d);if(l6m[k])l6m[k].e+=num(fv(co,F.cob.valorReceber));
    }
  }
  const cfs=activeCF();let cfTotal=0;for(const c of cfs)cfTotal+=num(fv(c,F.cf.valor));
  const inad=totalCob?(totalDev/totalCob*100).toFixed(1):'0';

  let html='<div class="section"><h2>'+t('aging')+'</h2>'+
    '<div class="kpi">'+Object.values(buckets).map(v=>'<div class="box"><div class="l">'+v.l+'</div><div class="v">'+fmtBRL(v.v)+'</div><div class="l">'+v.c+' cob</div></div>').join('')+'</div></div>';
  html+='<div class="section"><h2>'+t('top10')+'</h2>'+
    (top.length?'<table><thead><tr><th>'+t('client')+'</th><th class="right">'+t('value')+'</th><th class="right">%</th></tr></thead><tbody>'+
    top.map(x=>'<tr><td>'+esc(x[0])+'</td><td class="right">'+fmtBRL(x[1])+'</td><td class="right">'+(totalRev?(x[1]/totalRev*100).toFixed(1):'0')+'%</td></tr>').join('')+'</tbody></table>':'<div class="empty">'+t('noData')+'</div>')+'</div>';
  html+='<div class="section"><h2>'+t('monthly')+' '+year+'</h2>'+
    '<div class="bar-chart">'+Object.entries(byMonth).map(([m,v])=>{
      const he=Math.round(v.e/maxV*130),hs=Math.round(v.s/maxV*130);
      return '<div class="bar-col"><div class="bars"><div class="bar green" style="height:'+he+'px" title="'+fmtBRL(v.e)+'"></div><div class="bar red" style="height:'+hs+'px" title="'+fmtBRL(v.s)+'"></div></div><div class="lbl">'+m+'</div></div>';
    }).join('')+'</div>'+
    '<div style="margin-top:8px;font-size:12px;color:#6b7c8c"><span style="color:#22a06b">■</span> '+t('entradas')+'  <span style="color:#d64545">■</span> '+t('saidasLbl')+'</div></div>';
  html+='<div class="section"><h2>'+t('margem')+'</h2>'+
    '<table><thead><tr><th>Mês</th><th class="right">'+t('entradas')+'</th><th class="right">'+t('saidasLbl')+'</th><th class="right">Margem</th></tr></thead><tbody>'+
    last6.map(x=>'<tr><td>'+x.lbl+'</td><td class="right">'+fmtBRL(x.e)+'</td><td class="right">'+fmtBRL(x.s)+'</td><td class="right">'+fmtBRL(x.e-x.s)+'</td></tr>').join('')+'</tbody></table></div>';
  html+='<div class="section"><div class="kpi">'+
    '<div class="box"><div class="l">'+t('dso')+'</div><div class="v">'+dso+' d</div></div>'+
    '<div class="box red"><div class="l">'+t('inad')+'</div><div class="v">'+inad+'%</div></div>'+
    '<div class="box orange"><div class="l">'+t('conc')+'</div><div class="v">'+conc+'%</div></div>'+
    '<div class="box"><div class="l">Custos fixos/mês</div><div class="v">'+fmtBRL(cfTotal)+'</div></div>'+
    '</div></div>';
  html+='<div class="section"><h2>'+t('custosAtivos')+' — '+fmtBRL(cfTotal)+'</h2>'+
    (cfs.length?'<table><thead><tr><th>Nome</th><th class="right">Dia</th><th class="right">'+t('value')+'</th></tr></thead><tbody>'+
    cfs.sort((a,b)=>num(fv(b,F.cf.valor))-num(fv(a,F.cf.valor))).map(c=>'<tr><td>'+esc(fv(c,F.cf.nome)||'—')+'</td><td class="right">'+(fv(c,F.cf.dia)||'—')+'</td><td class="right">'+fmtBRL(num(fv(c,F.cf.valor)))+'</td></tr>').join('')+'</tbody></table>':'<div class="empty">'+t('noData')+'</div>')+
    '</div>';
  // Evolução mensal (snapshots)
  const snaps=getSnapshots();
  html+='<div class="section"><h2>Evolução Mensal (Fechamentos)</h2>'+
    (snaps.length?'<table><thead><tr><th>Mês</th><th class="right">Receita</th><th class="right">Saídas Op.</th><th class="right">Retiradas</th><th class="right">Resultado</th><th class="right">Saldo Final</th></tr></thead><tbody>'+
    snaps.slice().reverse().map(s=>'<tr><td>'+monthLabel(s.mes)+'</td><td class="right">'+fmtBRL(s.receita)+'</td><td class="right">'+fmtBRL(s.saidasOp)+'</td><td class="right">'+fmtBRL(s.retiradas)+'</td><td class="right"><strong>'+fmtBRL(s.resultado)+'</strong></td><td class="right">'+fmtBRL(s.saldoFinal)+'</td></tr>').join('')+'</tbody></table>':'<div class="empty">Nenhum mês fechado ainda. Use "Fechar Mês" na Visão Geral.</div>')+
    '</div>';
  return html;
}

function attachHandlers(){
  document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{TAB=b.dataset.tab;EXPANDED_CARD=null;EXPANDED_ROW=null;render();});
  document.querySelectorAll('.card[data-card]').forEach(card=>{
    card.onclick=()=>{const k=card.dataset.card;EXPANDED_CARD=EXPANDED_CARD===k?null:k;EXPANDED_ROW=null;render();};
  });
  document.querySelectorAll('tr.clickable').forEach(tr=>{
    tr.onclick=e=>{
      if(e.target.closest('.detail'))return;
      const rid=tr.dataset.row;EXPANDED_ROW=EXPANDED_ROW===rid?null:rid;render();
    };
  });
  document.querySelectorAll('.detail').forEach(d=>d.onclick=e=>e.stopPropagation());
  document.querySelectorAll('[data-act="save"]').forEach(b=>{b.onclick=ev=>{ev.stopPropagation();handleSave(b);};});
  document.querySelectorAll('[data-act="fecharMes"]').forEach(b=>{b.onclick=ev=>{ev.stopPropagation();fecharMes();};});
  const ha=document.getElementById('histApply');
  if(ha)ha.onclick=()=>{HIST_FROM=document.getElementById('histFrom').value;HIST_TO=document.getElementById('histTo').value;render();};
  const ss=document.getElementById('sortSel');
  if(ss)ss.onchange=e=>{SORT_MODE=e.target.value;render();};
}

document.getElementById('langSel').onchange=e=>{LANG=e.target.value;buildMonthSelector();render();};
document.getElementById('reloadBtn').onclick=loadData;
</script>
</body>
