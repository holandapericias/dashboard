// ─── API ───
async function F(tb,f,fl){let a=[],o=null;do{const p=new URLSearchParams;if(f)p.set("filterByFormula",f);if(o)p.set("offset",o);(fl||[]).forEach(x=>p.append("fields[]",x));p.set("pageSize","100");const r=await fetch(`https://api.airtable.com/v0/${BS}/${encodeURIComponent(tb)}?${p}`,{headers:{Authorization:`Bearer ${TK}`}});const d=await r.json();if(d.error)throw new Error(d.error.message);if(d.records)a=a.concat(d.records);o=d.offset||null}while(o);return a}

async function patchAT(table,recId,fields){
  const r=await fetch(`https://api.airtable.com/v0/${BS}/${encodeURIComponent(table)}/${recId}`,{
    method:"PATCH",headers:{Authorization:`Bearer ${TK}`,"Content-Type":"application/json"},
    body:JSON.stringify({fields})});
  if(!r.ok)throw new Error("PATCH failed");return r.json();
}
async function postAT(table,fields){
  const r=await fetch(`https://api.airtable.com/v0/${BS}/${encodeURIComponent(table)}`,{
    method:"POST",headers:{Authorization:`Bearer ${TK}`,"Content-Type":"application/json"},
    body:JSON.stringify({records:[{fields}]})});
  if(!r.ok)throw new Error("POST failed");return r.json();
}

// ─── HELPERS ───
function clientName(c){const ids=c.fields.Cliente||[];for(const id of ids){if(CL[id])return CL[id].name}return"—"}
function clientData(c){const ids=c.fields.Cliente||[];for(const id of ids){if(CL[id])return CL[id]}return null}
// KNOWN DEBTOR client record IDs (from spec)
const DEBTOR_CLIENTS=new Set(["recTeLOQoAANlYJiz","rectpEuF1HzHFDVCi"]); // Veneza, Rei do Sushi

function isDebtorClient(c){
  const ids=c.fields.Cliente||[];
  for(const id of ids){
    if(DEBTOR_CLIENTS.has(id))return true;
    const cl=CL[id];
    if(cl){const n=cl.name.toLowerCase();if(n.includes("veneza")||n.includes("rei do sushi"))return true}
  }
  return false;
}
function isDebtor(c){return(c.fields.Fase||"")==="Devedor"||isDebtorClient(c)}

function needsCnf(c){
  // Debtors are NEVER in the "confirm" section — they go to debtors
  if(isDebtor(c))return false;
  const cd=clientData(c);
  if(cd&&cd.cnf)return true;
  const cn=(cd?cd.name:"").toLowerCase();
  if(cn.includes("moura")||cn.includes("doubex")||cn.includes("servis")||cn.includes("servtec")||cn.includes("parangaba"))return true;
  return false;
}
function ec(p){const f=p.fields;const rv=f["Valor Assistente"];if(rv&&rv>0)return{v:rv,c:true};const tp=f["Tipo de Perícia"]||"",l=(f["Local da Perícia"]||"").toLowerCase();if(tp==="Engenharia")return{v:1000,c:false};const iF=l.includes("fortaleza")||l.includes("aldeota")||l.includes("fátima")||l.includes("meireles");return{v:iF?600:1000,c:false}}

// Rescheduling fee: count distinct "Data da Perícia" dates from Prazos linked to case
function rescFee(caso){
  const dates=caso.fields["Data da Perícia (from Prazos)"]||[];
  const extra=Math.max(0,dates.length-1);
  return extra*500;
}
// Find all Entrada cobranças linked to a case (by link OR by name match)
function findLinkedEntradas(caso){
  const f=caso.fields;
  const cobIds=f["Cobranças"]||[];
  const kw=(f["Palavra Chave"]||"").toLowerCase().trim();
  // Extract meaningful parts for name matching - split on " x " to get parties
  const kwParts=kw.split(/\s+x\s+/i);
  const kwFirst=(kwParts[0]||"").replace(/^\(.*?\)\s*/,"").trim(); // remove (Médica) prefix
  
  return CO.filter(c=>{
    if(c.fields.Tipo!=="Entrada")return false;
    // Match by link: case→cob
    if(cobIds.includes(c.id))return true;
    // Match by link: cob→case
    if((c.fields["Caso relacionado"]||[]).includes(caso.id))return true;
    // Fallback: match by name
    const cn=(c.fields.Name||"").toLowerCase();
    // Full keyword match
    if(kw.length>5&&cn.includes(kw))return true;
    // Partial match: cobrança name contains case keyword or vice versa
    if(kw.length>5&&kw.includes(cn)&&cn.length>10)return true;
    // Match by first party name (e.g. "Tatiana Maria" in cobrança name)
    if(kwFirst.length>5&&cn.includes(kwFirst))return true;
    // Match by last part (defendant/company)
    if(kwParts.length>1){
      const kwLast=kwParts[kwParts.length-1].trim();
      if(kwLast.length>5&&cn.includes(kwLast))return true;
    }
    return false;
  });
}

// What remains to bill for a case
function billCalc(caso){
  const f=caso.fields;
  const va=f["Valor Acordado"]||0;
  const fmt=(f["Formato de Pagamento"]||"");
  const is5050=fmt.includes("50/50");
  const linked=findLinkedEntradas(caso);
  const rf=rescFee(caso);
  
  if(is5050){
    const has50i=linked.some(c=>(c.fields["Tipo de Pagamento"]||[]).some(t=>t.includes("Iniciais")));
    const has50f=linked.some(c=>(c.fields["Tipo de Pagamento"]||[]).some(t=>t.includes("Finais")));
    if(!has50i&&!has50f){
      // No cobranças at all — but double check: if ANY entrada exists with NF, consider it billed
      if(linked.length>0)return null;
      return{type:"50i",val:va/2,label:"50% Iniciais",rf:0};
    }
    if(has50i&&!has50f){
      return{type:"50f",val:va/2+rf,label:"50% Finais"+(rf?` + ${t("resc")} R$${rf}`:""),rf};
    }
    return null;
  } else {
    const hasNF=linked.some(c=>c.fields["Foi emitida NF?"]);
    if(linked.length===0||!hasNF){
      return{type:"100",val:va+rf,label:"100%"+(rf?` + ${t("resc")} R$${rf}`:""),rf};
    }
    return null;
  }
}

    h+=`<div class="tb">`;

    });
    h+=`</div></div>`;
  }
  if(!assUnpaid.length&&!cfDue.length) h+=`<div class="nv">${t("noData")}</div>`;
  h+=`</div>`;
  
  // ═══ 4.1.B — BILLING TO DO ═══
  // BOTH phases enter billing flow — exclude debtors and fully-billed cases
  const billablePhases=["Encerrado PARA COBRANÇA","Para cobrança pós perícia, falta manifestação"];
  const billAll=CA.filter(r=>billablePhases.includes(r.fields.Fase)&&!isDebtor(r));

  // Split by phase for visual grouping

  // "Encerrado PARA COBRANÇA" cases
  const encDir=billAllNeed.filter(r=>!isPostP(r)&&!needsCnf(r));

      h+=`<div style="padding:4px 16px 8px;border-bottom:1px solid #EDF2F7"><div class="cm-hist">${hist?hist.replace(/\n/g,"<br>"):""}</div><div style="display:flex;gap:6px;margin-top:4px"><input type="text" id="ci_${r.id}" placeholder="${t("addComment")}" style="flex:1;border:1px solid var(--bd);border-radius:4px;padding:4px 8px;font-size:11px;font-family:Barlow;outline:none"><button class="svbtn" style="padding:4px 10px;font-size:10px" onclick="addComment('${r.id}')">💬</button></div></div>`;
    });
    h+=`</div><div class="tt"><span>${t("tRec")}</span><span class="o">${$(tAR)}</span></div></div></div>`;
  }
  
  // ═══ DEBTORS ═══
  // All debtor cases: by fase OR by client identity (Veneza, Rei do Sushi)
  const allDebtorCases=CA.filter(r=>isDebtor(r));
  const allDebtorCaseIds=new Set(allDebtorCases.map(r=>r.id));
  const dv=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Entrada"||f["Recebido?"])return false;
    // NF Retida
    if(f["NF Retida (devedor)"])return true;
    // Linked to a Debtor case (by fase or by client)
    const cr=f["Caso relacionado"]||[];
    if(cr.some(id=>allDebtorCaseIds.has(id)))return true;
    // >90 days unpaid
    const dc=f["Data da cobrança"]?new Date(f["Data da cobrança"]):null;
    return dc&&dc<h90;
  });
  const tDV=dv.reduce((s,r)=>s+(r.fields["Valor a Receber"]||0),0);
  // Debtor cases that have no cobranças listed (show case-level info)
  const dvCaseIds=new Set();dv.forEach(r=>(r.fields["Caso relacionado"]||[]).forEach(id=>dvCaseIds.add(id)));
  const debtorCasesExtra=allDebtorCases.filter(r=>!dvCaseIds.has(r.id));
  
  if(dv.length||debtorCasesExtra.length){
    h+=`<div class="sec"><div class="st al">🚨 ${t("ovd")} <span class="cn">${dv.length+debtorCasesExtra.length}</span></div>`;
    h+=`<div class="abox abox-rd"><h3>${t("tOut")}: ${$(tDV)}</h3><div class="sub">${dv.length} ${L==="pt"?"cobranças em aberto":"open invoices"}${debtorCasesExtra.length?` · ${debtorCasesExtra.length} ${L==="pt"?"casos sem cobrança":"cases without invoices"}`:""}</div>`;
    h+=`<div class="tb al"><div class="th" style="grid-template-columns:1fr 45px 65px 55px 80px"><span>${t("case_")}</span><span>${t("nf")}</span><span>${t("inv")}</span><span>${t("dys")}</span><span style="text-align:right">${t("amt")}</span></div><div class="sc">`;
    dv.slice(0,30).forEach(r=>{
      const f=r.fields;const dc=f["Data da cobrança"]?new Date(f["Data da cobrança"]):null;const dias=dc?daysBetween(dc,hj):0;
      const nfRetida=f["NF Retida (devedor)"];
      h+=`<div class="tr" style="grid-template-columns:1fr 45px 65px 55px 80px"><span class="n">${(f.Name||"—")}${nfRetida?' <span class="bd bd-r">NF RETIDA</span>':''}</span><span class="d">${f["Número NF"]||"—"}</span><span class="d">${fD(f["Data da cobrança"])}</span><span><span class="bd bd-o">${dias}d</span></span><span class="a r">${$(f["Valor a Receber"])}</span></div>`;
    });
    // Show debtor cases without cobranças
    debtorCasesExtra.forEach(r=>{
      const f=r.fields;const cn=clientName(r);
      h+=`<div class="tr" style="grid-template-columns:1fr 45px 65px 55px 80px"><span class="n">${f["Palavra Chave"]||"—"} <span class="bd bd-r">DEVEDOR</span></span><span class="d">—</span><span class="d">${cn}</span><span>—</span><span class="a r">${$(f["Valor Acordado"])}</span></div>`;
    });
    h+=`</div></div></div></div>`;
  }
  
  h+=`<div class="fo">${t("lUpd")} ${new Date().toLocaleString(lc())} · Holanda Perícias FP&A</div>`;
  document.getElementById("main").innerHTML=h;
}

async function markPaid(recId,btn){
  btn.disabled=true;btn.textContent="...";
  try{
    const today=new Date().toISOString().split("T")[0];
    await patchAT("Cobranças",recId,{"Pago?":true,"Data do Pagamento":today});
    toast(t("saved"));
    setTimeout(reload,1000);
  }catch(e){toast(t("error")+" "+e.message,false);btn.disabled=false;btn.textContent="💰 "+t("markPaid")}
}

async function saveBill(casoId,tipo,idx){
  const nfn=document.getElementById("nfn_"+idx).value;
  const nfv=parseFloat(document.getElementById("nfv_"+idx).value)||0;
  const nfd=document.getElementById("nfd_"+idx).value;
  const btn=document.querySelector(`#bf_${idx} .svbtn`);
  btn.classList.add("saving");btn.textContent="...";
  
  try{
    const caso=CA.find(c=>c.id===casoId);
    if(!caso)throw new Error("Case not found");
    const cobIds=caso.fields["Cobranças"]||[];
    
    // Determine Tipo de Pagamento tag
    let tpPag=[];
    if(tipo==="50i")tpPag=["50% Iniciais"];
    else if(tipo==="50f")tpPag=["50% Finais"];
    else tpPag=["100%"];
    
    // Check if there's an existing linked cobrança to update
    let existingCob=null;
    if(cobIds.length){
      existingCob=CO.find(c=>cobIds.includes(c.id)&&c.fields.Tipo==="Entrada"&&!c.fields["Foi emitida NF?"]&&(c.fields["Tipo de Pagamento"]||[]).some(t=>tpPag.some(tp=>t.includes(tp))));
    }
    
    if(existingCob){
      await patchAT("Cobranças",existingCob.id,{
        "Foi emitida NF?":true,
        "Número NF":nfn,
        "Valor Bruto NF":nfv,
        "Data da cobrança":nfd
      });
    }else{
      await postAT("Cobranças",{
        "Tipo":"Entrada",
        "Caso relacionado":[casoId],
        "Valor a Receber":nfv,
        "Foi emitida NF?":true,
        "Número NF":nfn,
        "Valor Bruto NF":nfv,
        "Data da cobrança":nfd,
        "Tipo de Pagamento":tpPag
      });
    }
    toast(t("saved"));
    setTimeout(reload,1200);
  }catch(e){toast(t("error")+" "+e.message,false);btn.classList.remove("saving");btn.textContent="💾 "+t("saveCob")}
}

function addComment(recId){
  const inp=document.getElementById("ci_"+recId);

  const cmKey="cm_"+recId;

  savLC();inp.value="";
  RR();
}

function renderTab2(){
  const mk=document.getElementById("sel").value,yr=+mk.split("-")[0],mn=+mk.split("-")[1];
  const im=new Date(yr,mn-1,1),fm=new Date(yr,mn,0),hj=new Date();
  const d60=new Date(hj);d60.setDate(d60.getDate()+60);
  let h="";
  const PT=L==="pt";
  const tFC=CF.reduce((s,r)=>s+(r.fields["Valor Estimado"]||0),0);

  // ══════════════════════════════════════════
  // 0. SALDO BANCÁRIO REAL (user input)
  // ══════════════════════════════════════════
  const sb=getSaldoBank();
  const saldoDate=sb?new Date(sb.date):null;
  const saldoBanco=sb?sb.val:null;

  // Bank balance input form
  h+=`<div class="mcard" style="margin-bottom:20px"><h3>🏦 ${PT?"Saldo Bancário Real":"Real Bank Balance"}</h3>`;
  if(sb){
    h+=`<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">`;
    h+=`<div><div class="cl">${PT?"SALDO INFORMADO":"REPORTED BALANCE"}</div><div style="font-family:'Barlow Condensed';font-size:28px;font-weight:700;color:var(--hd)">${$(sb.val)}</div><div style="font-size:11px;color:var(--tl)">${PT?"em":"on"} ${new Date(sb.date).toLocaleDateString(lc())}</div></div>`;
    h+=`<div style="flex:1;display:flex;gap:8px;align-items:end;justify-content:flex-end;flex-wrap:wrap">`;
    h+=`<div><label style="font-size:10px;color:var(--tl);font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:3px">${PT?"Novo saldo":"New balance"}</label><input type="number" id="sbVal" step="0.01" placeholder="0.00" style="border:1px solid var(--bd);border-radius:4px;padding:6px 8px;font-size:12px;font-family:Barlow;width:120px"></div>`;
    h+=`<div><label style="font-size:10px;color:var(--tl);font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:3px">${PT?"Data":"Date"}</label><input type="date" id="sbDate" value="${hj.toISOString().split('T')[0]}" style="border:1px solid var(--bd);border-radius:4px;padding:6px 8px;font-size:12px;font-family:Barlow"></div>`;
    h+=`<button class="svbtn" onclick="saveSaldoBank(document.getElementById('sbVal').value,document.getElementById('sbDate').value)">💾</button>`;
    h+=`</div></div>`;
  }else{
    h+=`<p style="font-size:13px;color:var(--tl);margin-bottom:12px">${PT?"Informe o saldo atual da sua conta bancária para projeções precisas.":"Enter your current bank balance for accurate projections."}</p>`;
    h+=`<div style="display:flex;gap:8px;align-items:end;flex-wrap:wrap">`;
    h+=`<div><label style="font-size:10px;color:var(--tl);font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:3px">${PT?"Saldo":"Balance"}</label><input type="number" id="sbVal" step="0.01" placeholder="1513.90" style="border:1px solid var(--bd);border-radius:4px;padding:6px 8px;font-size:13px;font-family:Barlow;width:150px"></div>`;
    h+=`<div><label style="font-size:10px;color:var(--tl);font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:3px">${PT?"Data do extrato":"Statement date"}</label><input type="date" id="sbDate" value="${hj.toISOString().split('T')[0]}" style="border:1px solid var(--bd);border-radius:4px;padding:6px 8px;font-size:13px;font-family:Barlow"></div>`;
    h+=`<button class="svbtn" style="padding:10px 20px" onclick="saveSaldoBank(document.getElementById('sbVal').value,document.getElementById('sbDate').value)">💾 ${PT?"Salvar":"Save"}</button>`;
    h+=`</div>`;
  }
  h+=`</div>`;

  if(saldoBanco===null){
    h+=`<div class="alb"><span class="ic">⚠️</span><div class="mg">${PT?"Informe o saldo bancário acima para ver as projeções financeiras.":"Enter your bank balance above to see financial projections."}</div></div>`;
    h+=`<div class="fo">${t("lUpd")} ${new Date().toLocaleString(lc())} · Holanda Perícias FP&A</div>`;
    document.getElementById("main").innerHTML=h;
    return;
  }

  // ══════════════════════════════════════════
  // 1. ADJUST SALDO: add Airtable movements AFTER the bank statement date
  // ══════════════════════════════════════════
  let saldoHoje=saldoBanco;

  // Add received payments after statement date
  CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Entrada"||!f["Recebido?"])return false;
    const d=f["Data recebimento"]?new Date(f["Data recebimento"]):null;
    return d&&d>saldoDate;
  }).forEach(r=>{saldoHoje+=(r.fields["Valor Líquido Recebido"]||r.fields["Valor a Receber"]||0)});

  // Subtract payments made after statement date
  CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Saída"||!f["Pago?"])return false;
    const d=f["Data do Pagamento"]?new Date(f["Data do Pagamento"]):null;
    return d&&d>saldoDate;
  }).forEach(r=>{saldoHoje-=(r.fields["Valor de Pagamento"]||r.fields["Valor a Receber"]||0)});

  // ══════════════════════════════════════════
  // 2. PERSONAL WITHDRAWALS (Retirada pessoal)
  // ══════════════════════════════════════════
  const isRetirada=r=>(r.fields.Name||"").toLowerCase().includes("retirada");
  const retiradasMes=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Saída"||!isRetirada(r))return false;
    const d=f["Data do Pagamento"]?new Date(f["Data do Pagamento"]):null;
    return d&&d>=im&&d<=fm;
  });
  const tRetMes=retiradasMes.reduce((s,r)=>s+(r.fields["Valor de Pagamento"]||r.fields["Valor a Receber"]||0),0);
  const retiradasAll=CO.filter(r=>r.fields.Tipo==="Saída"&&isRetirada(r));
  const tRetAll=retiradasAll.reduce((s,r)=>s+(r.fields["Valor de Pagamento"]||r.fields["Valor a Receber"]||0),0);

  // ══════════════════════════════════════════
  // 3. BUILD OUTFLOWS (next 60 days)
  // ══════════════════════════════════════════
  const outflows=[];

  // Fixed costs on due days (next 2 months)
  for(let mo=0;mo<2;mo++){
    CF.forEach(r=>{
      const f=r.fields;const dia=f["Dia Vencimento"]||1;
      const dt=new Date(hj.getFullYear(),hj.getMonth()+mo,dia);
      if(dt>hj&&dt<=d60) outflows.push({date:dt,amount:f["Valor Estimado"]||0,label:f.Name,type:"fixed"});
    });
  }

  // Unpaid assistant fees (pay within 7 days)
  const assMinDate=new Date("2026-04-01");
  CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Saída"||f["Pago?"]||isRetirada(r))return false;
    const dc=f["Data da cobrança"]?new Date(f["Data da cobrança"]):null;
    return dc&&dc>=assMinDate;
  }).forEach(r=>{
    const f=r.fields;const v=f["Valor de Pagamento"]||f["Valor a Receber"]||0;
    const dt=new Date(hj);dt.setDate(dt.getDate()+7);
    if(dt<=d60) outflows.push({date:dt,amount:v,label:(f.Name||"Assistente").substring(0,40),type:"assistant"});
  });

  // Upcoming exams → assistant costs ~15d after
  PZ.filter(r=>{const dt=r.fields["Data da Perícia"];if(!dt)return false;const d=new Date(dt);return d>=hj&&d<=d60&&(r.fields["Tipo de Prazos"]||"").includes("Perícia")}).forEach(r=>{
    const f=r.fields;const e=ec(r);
    const payDt=new Date(f["Data da Perícia"]);payDt.setDate(payDt.getDate()+15);
    if(payDt<=d60) outflows.push({date:payDt,amount:e.v,label:(f.Nome||"Perícia").substring(0,40),type:"exam_ass"});
  });

  // ══════════════════════════════════════════
  // 4. BUILD INFLOWS (next 60 days)
  // ══════════════════════════════════════════
  const inflows=[];

  CO.filter(r=>{const f=r.fields;return f.Tipo==="Entrada"&&!f["Recebido?"]&&f["Foi emitida NF?"]&&!f["NF Retida (devedor)"]&&f["Data da cobrança"]}).forEach(r=>{
    const f=r.fields;const v=f["Valor a Receber"]||0;
    const dc=new Date(f["Data da cobrança"]);const dias=daysBetween(dc,hj);
    let estDate;
    if(f["Previsão de Pagamento"]){
      estDate=new Date(f["Previsão de Pagamento"]);
      if(estDate<hj){estDate=new Date(hj);estDate.setDate(estDate.getDate()+15)}
    }else{
      const caseIds=f["Caso relacionado"]||[];const caso=CA.find(c=>caseIds.includes(c.id));
      const cd=caso?clientData(caso):null;const avg=cd?cd.prazo:45;
      estDate=new Date(dc);estDate.setDate(estDate.getDate()+avg);
      if(estDate<hj){estDate=new Date(hj);estDate.setDate(estDate.getDate()+15)}
    }
    let prob=0.9;
    if(dias>90)prob=0.1;else if(dias>60)prob=0.4;else if(dias>30)prob=0.7;
    if(estDate<=d60) inflows.push({date:estDate,amount:v,label:(f.Name||"").substring(0,40),prob,type:"pending"});
  });

  // Cases ready to bill
  CA.filter(r=>{const fase=r.fields.Fase;return(fase==="Encerrado PARA COBRANÇA"||fase==="Para cobrança pós perícia, falta manifestação")&&!isDebtor(r)&&billCalc(r)!==null}).forEach(r=>{
    const bc=billCalc(r);if(!bc)return;
    const cd=clientData(r);const avg=cd?cd.prazo:45;
    const estDate=new Date(hj);estDate.setDate(estDate.getDate()+7+avg);
    if(estDate<=d60) inflows.push({date:estDate,amount:bc.val,label:(r.fields["Palavra Chave"]||"").substring(0,40),prob:0.6,type:"to_bill"});
  });

  // ══════════════════════════════════════════
  // 5. SIMULATE DAY BY DAY
  // ══════════════════════════════════════════
  const days=[];
  let saldo=saldoHoje;let minSaldo=saldoHoje;let minSaldoDate=hj;

  for(let d=1;d<=60;d++){
    const dt=new Date(hj);dt.setDate(dt.getDate()+d);
    const ds=dt.toISOString().split("T")[0];
    const dayOut=outflows.filter(o=>o.date.toISOString().split("T")[0]===ds);
    const dayOutTotal=dayOut.reduce((s,o)=>s+o.amount,0);
    const dayIn=inflows.filter(i=>i.date.toISOString().split("T")[0]===ds);
    const dayInWeighted=dayIn.reduce((s,i)=>s+i.amount*i.prob,0);
    saldo=saldo+dayInWeighted-dayOutTotal;
    if(saldo<minSaldo){minSaldo=saldo;minSaldoDate=dt}
    if(dayOut.length||dayIn.length||d%7===0) days.push({d,dt,ds,saldo,dayIn,dayInWeighted,dayOut,dayOutTotal});
  }

  const reserva=tFC;
  const safeWithdraw=Math.max(0,minSaldo-reserva);
  const totalInflowW=inflows.reduce((s,i)=>s+i.amount*i.prob,0);
  const totalOutflowV=outflows.reduce((s,o)=>s+o.amount,0);

  // ══════════════════════════════════════════
  // RENDER
  // ══════════════════════════════════════════

  // HERO: Safe withdrawal
  h+=`<div class="hero ${safeWithdraw>0?'ps':'ng'}" style="padding:32px">`;
  h+=`<div class="hl">${PT?"💰 QUANTO POSSO RETIRAR HOJE COM SEGURANÇA":"💰 SAFE TO WITHDRAW TODAY"}</div>`;
  h+=`<div class="hv ${safeWithdraw>0?'g':'r'}" style="font-size:48px">${$(safeWithdraw)}</div>`;
  h+=`<div class="hs" style="margin-top:12px;line-height:1.6">`;
  h+=`${PT?"Saldo estimado hoje":"Estimated balance today"}: <strong>${$(saldoHoje)}</strong> · `;
  h+=`${PT?"Ponto mais baixo (60d)":"Lowest point (60d)"}: <strong class="${minSaldo>=0?'g':'r'}">${$(minSaldo)}</strong> (${minSaldoDate.toLocaleDateString(lc())}) · `;
  h+=`${PT?"Reserva":"Reserve"}: <strong>${$(reserva)}</strong>`;
  h+=`</div></div>`;

  // 4 CARDS
  h+=`<div class="cds">`;
  h+=`<div class="crd"><div class="cl">${PT?"SALDO ESTIMADO":"EST. BALANCE"}</div><div class="cv ${saldoHoje>=0?'g':'r'}">${$(saldoHoje)}</div><div class="csb">${PT?"Banco":"Bank"} + ${PT?"movimentos":"movements"}</div></div>`;
  h+=`<div class="crd"><div class="cl">${PT?"ENTRADAS (60d)":"INFLOWS (60d)"}</div><div class="cv g">${$(totalInflowW)}</div><div class="csb">${inflows.length} ${PT?"ponderadas":"weighted"}</div></div>`;
  h+=`<div class="crd"><div class="cl">${PT?"SAÍDAS (60d)":"OUTFLOWS (60d)"}</div><div class="cv r">${$(totalOutflowV)}</div><div class="csb">${outflows.length} ${PT?"compromissos":"commitments"}</div></div>`;
  h+=`<div class="crd" style="border-top-color:var(--or)"><div class="cl">${PT?"RETIRADAS (MÊS)":"WITHDRAWALS (MO)"}</div><div class="cv o">${$(tRetMes)}</div><div class="csb">${retiradasMes.length} ${PT?"retiradas pessoais":"personal"}</div></div>`;
  h+=`</div>`;

  // CASH FLOW TIMELINE
  h+=`<div class="sec"><div class="st">${PT?"📅 Fluxo de Caixa — Dia a Dia":"📅 Cash Flow Timeline"}</div>`;
  h+=`<div class="tb"><div class="th" style="grid-template-columns:80px 1fr 90px 90px 100px"><span>${PT?"DATA":"DATE"}</span><span>${PT?"EVENTO":"EVENT"}</span><span style="text-align:right">▲ ${PT?"ENTRA":"IN"}</span><span style="text-align:right">▼ ${PT?"SAI":"OUT"}</span><span style="text-align:right">${PT?"SALDO":"BAL."}</span></div><div class="sc" style="max-height:500px">`;
  h+=`<div class="tr" style="grid-template-columns:80px 1fr 90px 90px 100px;background:#F7FBFE;font-weight:600"><span class="d">${PT?"HOJE":"TODAY"}</span><span class="d">${PT?"Saldo estimado":"Estimated balance"}</span><span></span><span></span><span class="a ${saldoHoje>=0?'g':'r'}">${$(saldoHoje)}</span></div>`;

  days.forEach(day=>{
    const dateStr=day.dt.toLocaleDateString(lc(),{day:"numeric",month:"short"});
    if(!day.dayIn.length&&!day.dayOut.length){
      h+=`<div class="tr" style="grid-template-columns:80px 1fr 90px 90px 100px;background:#FAFCFE"><span class="d">${dateStr}</span><span class="d" style="font-style:italic">—</span><span></span><span></span><span class="a ${day.saldo>=0?'g':'r'}">${$(day.saldo)}</span></div>`;
      return;
    }
    const events=[];
    day.dayIn.forEach(i=>{events.push({label:i.label+(i.prob<0.9?` (${Math.round(i.prob*100)}%)`:""),inV:i.amount*i.prob,outV:0})});
    day.dayOut.forEach(o=>{events.push({label:o.label,inV:0,outV:o.amount})});
    events.forEach((ev,idx)=>{
      const showSaldo=idx===events.length-1;
      const isAlert=showSaldo&&day.saldo<reserva;
      h+=`<div class="tr" style="grid-template-columns:80px 1fr 90px 90px 100px${isAlert?';background:var(--rb)':''}">`;
      h+=`<span class="d">${idx===0?dateStr:""}</span>`;
      h+=`<span class="d" style="font-size:11px">${ev.label}</span>`;
      h+=`<span class="a g" style="font-size:12px">${ev.inV?$(ev.inV):""}</span>`;
      h+=`<span class="a r" style="font-size:12px">${ev.outV?$(ev.outV):""}</span>`;
      h+=`<span class="a ${day.saldo>=0?'g':'r'}" style="font-size:12px">${showSaldo?$(day.saldo):""}</span>`;
      h+=`</div>`;
    });
  });
  h+=`</div></div></div>`;

  // BREAKDOWN
  h+=`<div class="fg" style="margin-bottom:24px">`;
  h+=`<div class="fb"><h3 class="g">▲ ${PT?"ENTRADAS ESPERADAS":"EXPECTED INFLOWS"}</h3>`;
  const byTypeIn={pending:0,to_bill:0};
  inflows.forEach(i=>{byTypeIn[i.type]=(byTypeIn[i.type]||0)+i.amount*i.prob});
  h+=`<div class="fr"><span class="l">${PT?"Cobranças pendentes (c/ NF)":"Pending invoices"}</span><span class="v g">${$(byTypeIn.pending||0)}</span></div>`;
  h+=`<div class="fr"><span class="l">${PT?"Casos prontos p/ cobrar":"Ready to bill"}</span><span class="v g">${$(byTypeIn.to_bill||0)}</span></div>`;
  h+=`<div class="ft"><span>${PT?"Total (ponderado)":"Total (weighted)"}</span><span class="g">${$(totalInflowW)}</span></div></div>`;

  h+=`<div class="fb"><h3 class="r">▼ ${PT?"SAÍDAS PREVISTAS":"EXPECTED OUTFLOWS"}</h3>`;
  const outByType={fixed:0,assistant:0,exam_ass:0};
  outflows.forEach(o=>{outByType[o.type]=(outByType[o.type]||0)+o.amount});
  h+=`<div class="fr"><span class="l">${PT?"Custos fixos":"Fixed costs"}</span><span class="v r">${$(outByType.fixed||0)}</span></div>`;
  h+=`<div class="fr"><span class="l">${PT?"Assistentes pendentes":"Pending assistants"}</span><span class="v r">${$(outByType.assistant||0)}</span></div>`;
  h+=`<div class="fr"><span class="l">${PT?"Perícias futuras":"Future exams"}</span><span class="v r">${$(outByType.exam_ass||0)}</span></div>`;
  h+=`<div class="ft"><span>${PT?"Total saídas":"Total outflows"}</span><span class="r">${$(totalOutflowV)}</span></div>`;
  h+=`<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--bd)"><div class="fr"><span class="l" style="color:var(--t3)">🛡️ ${PT?"Reserva (1× custos fixos)":"Reserve (1× fixed costs)"}</span><span class="v" style="color:var(--t3)">${$(reserva)}</span></div></div>`;
  h+=`</div></div>`;

  // PERSONAL WITHDRAWALS
  if(retiradasAll.length){
    h+=`<div class="sec"><div class="st" style="color:var(--or);border-color:#FFB74D">👤 ${PT?"Retiradas Pessoais — Adiantamento de Lucro":"Personal Withdrawals"} <span class="cn" style="background:var(--or)">${$(tRetAll)} ${PT?"total":"total"}</span></div>`;
    h+=`<div class="mcard" style="border-top:3px solid var(--or)">`;
    h+=`<div style="display:flex;gap:20px;margin-bottom:12px;flex-wrap:wrap">`;
    h+=`<div><div class="cl">${PT?"ESTE MÊS":"THIS MONTH"}</div><div style="font-family:'Barlow Condensed';font-size:24px;font-weight:700;color:var(--or)">${$(tRetMes)}</div><div style="font-size:11px;color:var(--tl)">${retiradasMes.length} ${PT?"retiradas":"withdrawals"}</div></div>`;
    h+=`<div><div class="cl">${PT?"TOTAL ACUMULADO":"ALL TIME"}</div><div style="font-family:'Barlow Condensed';font-size:24px;font-weight:700;color:var(--rd)">${$(tRetAll)}</div><div style="font-size:11px;color:var(--tl)">${retiradasAll.length} ${PT?"retiradas":"withdrawals"}</div></div>`;
    h+=`</div>`;
    // Recent withdrawals list
    const recentRet=retiradasAll.sort((a,b)=>{const da=a.fields["Data do Pagamento"]||"";const db=b.fields["Data do Pagamento"]||"";return db.localeCompare(da)}).slice(0,10);
    if(recentRet.length){
      h+=`<div class="tb"><div class="th" style="grid-template-columns:80px 1fr 80px"><span>${PT?"Data":"Date"}</span><span>${PT?"Descrição":"Description"}</span><span style="text-align:right">${PT?"Valor":"Amount"}</span></div>`;
      recentRet.forEach(r=>{const f=r.fields;
        h+=`<div class="tr" style="grid-template-columns:80px 1fr 80px"><span class="d">${fD(f["Data do Pagamento"])}</span><span class="n">${f.Name||"Retirada"}</span><span class="a o">${$(f["Valor de Pagamento"]||f["Valor a Receber"])}</span></div>`;
      });
      h+=`</div>`;
    }
    h+=`</div></div>`;
  }

  // HEALTH METRICS
  h+=`<div class="sec"><div class="st">📊 ${PT?"Saúde Financeira":"Financial Health"}</div>`;

  // Aging
  const allPendAg=CO.filter(r=>{const f=r.fields;return f.Tipo==="Entrada"&&!f["Recebido?"]&&f["Data da cobrança"]});
  const aging={a:0,b:0,c:0,d:0};
  allPendAg.forEach(r=>{const dc=new Date(r.fields["Data da cobrança"]);const dias=daysBetween(dc,hj);const v=r.fields["Valor a Receber"]||0;if(dias<=30)aging.a+=v;else if(dias<=60)aging.b+=v;else if(dias<=90)aging.c+=v;else aging.d+=v});
  const agTot=aging.a+aging.b+aging.c+aging.d||1;
  h+=`<div class="mcard"><h3>${PT?"Aging de Recebíveis":"Receivables Aging"}</h3>`;
  h+=`<div class="aging-bar"><div class="aging-seg" style="width:${aging.a/agTot*100}%;background:var(--gn)">0-30d</div><div class="aging-seg" style="width:${aging.b/agTot*100}%;background:#FFA000">30-60d</div><div class="aging-seg" style="width:${aging.c/agTot*100}%;background:var(--or)">60-90d</div><div class="aging-seg" style="width:${aging.d/agTot*100}%;background:var(--rd)">90+d</div></div>`;
  h+=`<div style="display:flex;gap:16px;font-size:12px;color:var(--tl);margin-top:8px;flex-wrap:wrap"><span style="color:var(--gn)">0-30d: ${$(aging.a)}</span><span style="color:#FFA000">30-60d: ${$(aging.b)}</span><span style="color:var(--or)">60-90d: ${$(aging.c)}</span><span style="color:var(--rd)">90+d: ${$(aging.d)}</span></div>`;
  if(aging.d>0) h+=`<div style="background:var(--rb);border-radius:4px;padding:8px;font-size:11px;color:var(--rd);margin-top:8px">⚠️ ${$(aging.d)} ${PT?"com +90 dias":"over 90 days"}</div>`;
  h+=`</div>`;

  // DSO + Runway
  const paidR=CO.filter(r=>{const f=r.fields;return f.Tipo==="Entrada"&&f["Recebido?"]&&f["Data da cobrança"]&&f["Data recebimento"]});
  let dsoS=0,dsoC=0;
  paidR.forEach(r=>{const dc=new Date(r.fields["Data da cobrança"]);const dr=new Date(r.fields["Data recebimento"]);const d=daysBetween(dc,dr);if(d>=0&&d<365){dsoS+=d;dsoC++}});
  const dsoReal=dsoC?Math.round(dsoS/dsoC):0;
  const clPrazos=Object.values(CL).map(c=>c.prazo).filter(p=>p>0);
  const dsoExp=clPrazos.length?Math.round(clPrazos.reduce((a,b)=>a+b,0)/clPrazos.length):45;
  const runway=tFC>0?(saldoHoje/tFC).toFixed(1):99;

  h+=`<div class="mgrid">`;
  h+=`<div class="mcard"><h3>${PT?"Prazo Médio Recebimento":"Avg Collection Period"}</h3><div class="mv ${dsoReal>dsoExp?'r':'g'}">${dsoReal} ${PT?"dias":"days"}</div><div class="md">${PT?"Real":"Actual"}: ${dsoReal}d · ${PT?"Esperado":"Expected"}: ${dsoExp}d</div></div>`;
  h+=`<div class="mcard"><h3>Runway</h3><div class="mv ${runway>3?'g':runway>1?'o':'r'}">${runway} ${PT?"meses":"months"}</div><div class="md">${PT?"Saldo":"Balance"} ÷ ${PT?"custos fixos":"fixed costs"} (${$(tFC)}/${PT?"mês":"mo"})</div></div>`;
  h+=`</div>`;

  // Revenue concentration
  const last12=new Date(hj);last12.setFullYear(last12.getFullYear()-1);
  const recL12=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Entrada"||!f["Recebido?"])return false;const d=f["Data recebimento"]?new Date(f["Data recebimento"]):null;return d&&d>=last12});
  const crMap={};
  recL12.forEach(r=>{const caseIds=r.fields["Caso relacionado"]||[];const caso=CA.find(c=>caseIds.includes(c.id));const cn=caso?clientName(caso):"Outro";crMap[cn]=(crMap[cn]||0)+(r.fields["Valor Líquido Recebido"]||r.fields["Valor a Receber"]||0)});
  const crE=Object.entries(crMap).sort((a,b)=>b[1]-a[1]);const crT=crE.reduce((s,e)=>s+e[1],0)||1;
  if(crE.length){
    h+=`<div class="mcard"><h3>${PT?"Concentração de Receita (12m)":"Revenue Concentration (12m)"}</h3>`;
    crE.slice(0,8).forEach(([name,val])=>{const pct=(val/crT*100).toFixed(1);const risk=pct>30;
      h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="width:140px;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div><div style="flex:1;height:18px;background:#EDF2F7;border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${risk?'var(--rd)':'var(--ac)'};border-radius:3px"></div></div><div style="font-size:12px;font-weight:600;width:50px;text-align:right;color:${risk?'var(--rd)':'var(--tx)'}">${pct}%</div></div>`});
    const riskCl=crE.filter(([_,v])=>v/crT>0.3);
    if(riskCl.length) h+=`<div style="background:var(--rb);border-radius:4px;padding:8px;font-size:11px;color:var(--rd);margin-top:8px">⚠️ ${riskCl.map(c=>c[0]).join(", ")} > 30%</div>`;
    h+=`</div>`;
  }
  h+=`</div>`;

  // MONTH RESULT (with withdrawal separation)
  const rM=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Entrada"||!f["Recebido?"])return false;const d=f["Data recebimento"]?new Date(f["Data recebimento"]):null;return d&&d>=im&&d<=fm});
  const tR=rM.reduce((s,r)=>s+(r.fields["Valor Líquido Recebido"]||r.fields["Valor a Receber"]||0),0);
  const gMOp=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Saída"||isRetirada(r))return false;const d=f["Data do Pagamento"]?new Date(f["Data do Pagamento"]):null;return d&&d>=im&&d<=fm});
  const tGOp=gMOp.reduce((s,r)=>s+(r.fields["Valor de Pagamento"]||r.fields["Valor a Receber"]||0),0);
  const luOp=tR-tGOp;
  const luReal=tR-tGOp-tRetMes;

  h+=`<div class="sec"><div class="st">${PT?"Resultado do Mês":"Month Result"}</div>`;
  h+=`<div class="cds">`;
  h+=`<div class="crd"><div class="cl">${t("rMonth")}</div><div class="cv g">${$(tR)}</div><div class="csb">${rM.length} ${t("pRec")}</div></div>`;
  h+=`<div class="crd"><div class="cl">${PT?"Gastos Operacionais":"Operating Expenses"}</div><div class="cv r">${$(tGOp)}</div><div class="csb">${gMOp.length} ${t("pMade")}</div></div>`;
  h+=`<div class="crd" style="border-top-color:var(--or)"><div class="cl">${PT?"Retiradas":"Withdrawals"}</div><div class="cv o">${$(tRetMes)}</div><div class="csb">${retiradasMes.length} ${PT?"pessoais":"personal"}</div></div>`;
  h+=`<div class="crd"><div class="cl">${PT?"Resultado Real":"Real Result"}</div><div class="cv ${luReal>=0?'g':'r'}">${$(luReal)}</div><div class="csb">${PT?"Receita − Oper. − Retiradas":"Rev − Ops − Withdrawals"}</div></div>`;
  h+=`</div></div>`;

  // ANNUAL CHART
  const ms=[];for(let m=1;m<=12;m++){const i2=new Date(yr,m-1,1),f2=new Date(yr,m,0);
    const r2=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Entrada"||!f["Recebido?"])return false;const d=f["Data recebimento"]?new Date(f["Data recebimento"]):null;return d&&d>=i2&&d<=f2}).reduce((s,r)=>s+(r.fields["Valor Líquido Recebido"]||r.fields["Valor a Receber"]||0),0);
    const g2=CO.filter(r=>{const f=r.fields;if(f.Tipo!=="Saída")return false;const d=f["Data do Pagamento"]?new Date(f["Data do Pagamento"]):null;return d&&d>=i2&&d<=f2}).reduce((s,r)=>s+(r.fields["Valor de Pagamento"]||r.fields["Valor a Receber"]||0),0);
    ms.push({m:`${yr}-${String(m).padStart(2,"0")}`,l:i2.toLocaleString(lc(),{month:"short"}),r:r2,g:g2,p:r2-g2})}
  const mx=Math.max(...ms.map(m=>Math.max(m.r,m.g)),1);
  h+=`<div class="sec"><div class="st">${yr} ${t("annOv")}</div><div class="cb"><div class="cg">${ms.map(m=>{const hR=mx?(m.r/mx)*90:0,hG=mx?(m.g/mx)*90:0;const c=m.m===mk;return`<div class="bp"><div class="b" style="height:${Math.max(2,hR)}px;background:${c?'var(--gn)':'#A5D6A7'}"></div><div class="b" style="height:${Math.max(2,hG)}px;background:${c?'var(--rd)':'#EF9A9A'}"></div></div>`}).join("")}</div><div class="ml">${ms.map(m=>`<div class="${m.m===mk?'cu':''}">${m.l}</div>`).join("")}</div><div class="lg"><span><span class="ldd" style="background:var(--gn)"></span>${t("rev")}</span><span><span class="ldd" style="background:var(--rd)"></span>${t("exp")}</span></div>`;
  h+=`<div class="ar ahd"><span>${t("mth")}</span><span style="text-align:right">${t("rev")}</span><span style="text-align:right">${t("exp")}</span><span style="text-align:right">${t("pl")}</span></div>`;
  ms.filter(m=>m.r>0||m.g>0).forEach(m=>{h+=`<div class="ar ${m.m===mk?'acu':''}"><span style="text-transform:capitalize">${m.l}</span><span class="g" style="text-align:right">${$(m.r)}</span><span class="r" style="text-align:right">${$(m.g)}</span><span class="${m.p>=0?'g':'r'}" style="text-align:right;font-weight:600">${$(m.p)}</span></div>`});
  h+=`</div></div>`;

  // FIXED COSTS
  h+=`<div class="sec"><div class="st">${PT?"Custos Fixos":"Fixed Costs"} <span class="cn">${$(tFC)}/${PT?"mês":"mo"}</span></div><div class="tb"><div class="th" style="grid-template-columns:1fr 80px 80px 100px"><span>Name</span><span>${PT?"Dia":"Day"}</span><span>${PT?"Categoria":"Category"}</span><span style="text-align:right">${PT?"Valor":"Value"}</span></div>`;
  CF.forEach(r=>{const f=r.fields;h+=`<div class="tr" style="grid-template-columns:1fr 80px 80px 100px"><span class="n">${f.Name}</span><span class="d">${PT?"Dia":"Day"} ${f["Dia Vencimento"]}</span><span><span class="bd bd-w">${f.Categoria||""}</span></span><span class="a r">${$(f["Valor Estimado"])}</span></div>`});
  h+=`<div class="tt"><span>${t("tot")}</span><span class="r">${$(tFC)}</span></div></div></div>`;

  h+=`<div class="fo">${t("lUpd")} ${new Date().toLocaleString(lc())} · Holanda Perícias FP&A</div>`;
  document.getElementById("main").innerHTML=h;
}
</script>

<script>

const _E="KlhPtR9gdXfAjHiWq05P1lhDa+R5HAzR4BdljIj7Ec2cfP279So8mwe9vHfngSNZ+mLMRWficGV6xhmcfi0p8WZkUYK0IOIVhj+gPhNYHPcOjiRMZ9TFIjMqb68Esm1OzP4uFMilgr9ygSO+p24=";
const _S="HolandaPericias2026";

async function _dk(pw){
  var e=new TextEncoder();
  var km=await crypto.subtle.importKey("raw",e.encode(pw),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:e.encode(_S),iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
}
async function _dt(pw){
  var key=await _dk(pw);
  var raw=Uint8Array.from(atob(_E),function(c){return c.charCodeAt(0)});
  var iv=raw.slice(0,12),tag=raw.slice(12,28),ct=raw.slice(28);
  var combined=new Uint8Array(ct.length+tag.length);
  combined.set(ct);combined.set(tag,ct.length);
  var dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv,tagLength:128},key,combined);
  return new TextDecoder().decode(dec);
}

    document.getElementById("pwIn").disabled=false;
  }
}

if(sessionStorage.getItem("hp_auth")==="1"&&sessionStorage.getItem("hp_tk")){
